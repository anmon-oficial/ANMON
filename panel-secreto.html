<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANMON | PANEL DE GESTIÓN</title>
    <style>
        :root {
            --bg: #F5F5F7;
            --card: #FFFFFF;
            --accent: #007AFF;
            --text-main: #1D1D1F;
            --text-sec: #86868B;
            --success: #34C759;
            --danger: #FF3B30;
        }
        body { 
            background: var(--bg); color: var(--text-main); margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 900px; margin: 40px auto; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin: 0; }
        .status-pill { border: 1px solid var(--success); color: var(--success); padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }

        /* GENERADOR */
        .card-gen { 
            background: var(--card); padding: 40px; border-radius: 24px; 
            box-shadow: 0 4px 40px rgba(0,0,0,0.03); text-align: center; margin-bottom: 30px;
        }
        .input-ref {
            width: 100%; max-width: 320px; padding: 14px; border: 1px solid #d1d1d6;
            border-radius: 12px; font-size: 15px; margin-bottom: 15px; outline: none; text-align: center;
            background: #fcfcfc;
        }
        .pin-display { 
            font-size: 50px; font-weight: 800; color: var(--accent); 
            letter-spacing: 10px; margin: 20px 0; font-family: 'SF Mono', monospace; 
        }
        .btn-main {
            background: var(--accent); color: white; border: none; padding: 18px 45px; 
            border-radius: 16px; font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-main:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); }
        .btn-main:active { transform: scale(0.97); }

        /* TABLA */
        .card-list { background: var(--card); border-radius: 24px; box-shadow: 0 4px 40px rgba(0,0,0,0.03); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #fafafa; text-align: left; padding: 20px; font-size: 11px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #f2f2f2; }
        td { padding: 20px; border-bottom: 1px solid #f2f2f2; font-size: 14px; }
        
        .user-name { font-weight: 600; color: var(--text-main); }
        .pin-code { font-family: monospace; font-weight: 700; color: var(--accent); background: #f0f7ff; padding: 6px 10px; border-radius: 8px; }
        .days-left { font-weight: 700; color: var(--success); }
        
        /* BOTÓN ELIMINAR MANUAL */
        .btn-del { 
            background: #fff5f5; color: var(--danger); border: 1px solid #ffdada; 
            padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: 800; 
            cursor: pointer; transition: all 0.2s; text-transform: uppercase;
        }
        .btn-del:hover { background: var(--danger); color: white; border-color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ANMON | Gestión de Accesos</h1>
        <div class="status-pill">CENTRO DE MANDO</div>
    </div>

    <div class="card-gen">
        <p style="color: var(--text-sec); margin-bottom: 15px; font-size: 14px;">Identificación del Usuario (Opcional):</p>
        <input type="text" id="ref-name" class="input-ref" placeholder="Ej: Juan Pérez / Taller">
        <div id="new-pin" class="pin-display">------</div>
        <button class="btn-main" onclick="generateAccess()">GENERAR PIN Y ACTIVAR 45 DÍAS</button>
    </div>

    <div class="card-list">
        <table>
            <thead>
                <tr>
                    <th>Usuario / Referencia</th>
                    <th>PIN Acceso</th>
                    <th>Vencimiento</th>
                    <th>Días</th>
                    <th>Control Manual</th>
                </tr>
            </thead>
            <tbody id="pin-table">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0", 
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // GENERAR PIN
    window.generateAccess = () => {
        const refName = document.getElementById('ref-name').value.trim() || "Usuario sin nombre";
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let pin = "";
        for (let i = 0; i < 6; i++) {
            pin += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        
        document.getElementById('new-pin').innerText = pin;

        const now = Date.now();
        const expires = now + (45 * 24 * 60 * 60 * 1000);

        set(ref(db, 'valid_pins/' + pin), {
            user_ref: refName,
            created: now,
            expires: expires
        });
        
        document.getElementById('ref-name').value = "";
    };

    // LISTADO Y CONTROL
    onValue(ref(db, 'valid_pins'), (snap) => {
        const table = document.getElementById('pin-table');
        table.innerHTML = "";
        const data = snap.val();
        
        if (!data) return;

        for (let pin in data) {
            const info = data[pin];
            const now = Date.now();
            const diff = info.expires - now;
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

            // Auto-limpieza si expiró
            if (days <= 0) {
                remove(ref(db, 'valid_pins/' + pin));
                continue;
            }

            const row = `
                <tr>
                    <td class="user-name">${info.user_ref}</td>
                    <td><span class="pin-code">${pin}</span></td>
                    <td style="color: var(--text-sec);">${new Date(info.expires).toLocaleDateString()}</td>
                    <td class="days-left">${days}d</td>
                    <td><button class="btn-del" onclick="deletePin('${pin}', '${info.user_ref}')">Revocar Acceso</button></td>
                </tr>
            `;
            table.innerHTML += row;
        }
    });

    // FUNCIÓN ELIMINAR MANUAL
    window.deletePin = (pin, user) => {
        if(confirm("¿Estás seguro de que quieres eliminar el acceso para: " + user + "? (PIN: " + pin + ")")) {
            remove(ref(db, 'valid_pins/' + pin));
        }
    };
</script>

</body>
</html>
