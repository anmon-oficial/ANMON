<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANMON | OS Core</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #161616;
            --accent-blue: #007aff; /* Azul Apple / Profesional */
            --accent-light: #4dabff;
            --text-main: #ffffff;
            --text-dim: #999999;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 20px; 
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header { margin-top: 60px; text-align: center; }
        .header h1 { font-weight: 800; letter-spacing: 10px; font-size: 32px; margin: 0; color: #fff; }
        .header p { color: var(--accent-blue); font-size: 12px; letter-spacing: 5px; text-transform: uppercase; font-weight: 900; margin-top: 8px; }

        /* TARJETA DE CONTROL */
        .glass-card { 
            background: var(--card-bg);
            width: 100%; max-width: 400px;
            padding: 45px 30px;
            border-radius: 35px;
            border: 1px solid #252525;
            margin-top: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        #pin-display { 
            font-size: 70px; font-weight: 200; letter-spacing: 8px; 
            color: #fff; text-align: center; margin-bottom: 40px;
        }

        .btn { 
            width: 100%; padding: 24px; border-radius: 20px; border: none; 
            font-weight: 800; font-size: 15px; text-transform: uppercase; 
            letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .btn-gen { background: #fff; color: #000; margin-bottom: 15px; }
        .btn-inj { background: var(--accent-blue); color: #fff; display: none; }

        /* LISTADO - LETRAS GRANDES */
        .list-header { 
            width: 100%; max-width: 400px;
            font-size: 14px; color: var(--text-dim); /* GRIS CLARO Y GRANDE */
            letter-spacing: 3px; text-transform: uppercase; 
            margin: 50px 0 20px; font-weight: 700;
            padding-left: 10px; border-left: 3px solid var(--accent-blue);
        }
        
        .access-item { 
            background: #111; 
            width: 100%; max-width: 400px;
            padding: 25px; border-radius: 25px; 
            margin-bottom: 15px; display: flex; 
            justify-content: space-between; align-items: center;
            border: 1px solid #222;
        }

        .pin-code { font-size: 24px; font-weight: 600; letter-spacing: 2px; color: #fff; }
        .info { font-size: 12px; color: var(--accent-light); font-weight: 800; margin-top: 5px; }
        
        .btn-del { 
            background: rgba(255, 68, 68, 0.1); color: #ff4444; 
            width: 45px; height: 45px; border-radius: 15px; border: none; font-size: 20px;
        }

        .btn-purge { 
            background: transparent; color: #444; font-size: 12px; 
            letter-spacing: 3px; border: none; cursor: pointer; margin: 40px 0;
            text-transform: uppercase; font-weight: 700;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>ANMON</h1>
    <p>OS CORE ADMIN</p>
</div>

<div class="glass-card">
    <div id="pin-display">000000</div>
    <button class="btn btn-gen" onclick="generatePin()">Nuevo Acceso</button>
    <button class="btn btn-inj" id="btn-act" onclick="activatePin()">Inyectar en Red</button>
</div>

<div class="list-header">Terminales Verificados</div>
<div style="width: 100%; max-width: 400px;" id="pin-list"></div>

<button class="btn-purge" onclick="purgeExpired()">— Depurar Sistema —</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('pin-display').style.color = "var(--accent-light)";
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000)
        });
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "000000";
        document.getElementById('pin-display').style.color = "#fff";
    };

    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            for (let key in data) {
                const days = Math.floor((data[key].expires - Date.now()) / (1000 * 60 * 60 * 24));
                const status = days < 0 ? "EXPIRADO" : `${days} DÍAS RESTANTES`;
                const div = document.createElement('div');
                div.className = "access-item";
                div.innerHTML = `<div><div class="pin-code">${key}</div><div class="info">${status}</div></div><button class="btn-del" onclick="deletePin('${key}')">✕</button>`;
                listDiv.appendChild(div);
            }
        }
    });

    window.deletePin = (key) => { if(confirm("¿Eliminar?")) remove(ref(db, 'valid_pins/' + key)); };
    window.purgeExpired = async () => {
        const snap = await get(ref(db, 'valid_pins'));
        const data = snap.val();
        if(data) {
            for(let key in data) if(data[key].expires < Date.now()) await remove(ref(db, 'valid_pins/' + key));
            alert("SISTEMA DEPURADO");
        }
    };
</script>
</body>
</html>
