<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANMON - Control Center</title>
    <style>
        :root { --accent: #00f3ff; --bg: #0a0a0a; --card: #141414; --danger: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }

        .container { width: 100%; max-width: 450px; margin-top: 40px; }
        h1 { font-weight: 900; letter-spacing: 10px; text-align: center; color: #fff; margin-bottom: 30px; font-size: 24px; }

        /* DISPLAY DEL PIN */
        .pin-box { background: var(--card); padding: 40px 20px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.05); text-align: center; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #pin-display { font-size: 42px; font-weight: 900; letter-spacing: 5px; color: var(--accent); text-shadow: 0 0 15px rgba(0,243,255,0.3); }

        /* BOTONES */
        button { width: 100%; padding: 20px; border-radius: 18px; border: none; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; margin-bottom: 12px; }
        .btn-main { background: var(--accent); color: #000; box-shadow: 0 4px 15px rgba(0,243,255,0.2); }
        .btn-main:active { transform: scale(0.98); }
        .btn-act { background: #fff; color: #000; display: none; }
        .btn-purge { background: rgba(255, 59, 48, 0.1); color: var(--danger); border: 1px solid rgba(255, 59, 48, 0.2); margin-top: 20px; }

        /* LISTA DE LLAVES */
        .list-container { margin-top: 40px; }
        h3 { font-size: 12px; color: #666; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; padding-left: 10px; }
        .item { background: var(--card); padding: 20px; border-radius: 22px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.03); }
        .pin-text { font-weight: 800; font-size: 18px; letter-spacing: 1px; }
        .days-text { font-size: 11px; color: #00f3ff; font-weight: 600; text-transform: uppercase; margin-top: 4px; display: block; }
        .expired-text { color: var(--danger); }
        .btn-del { width: 40px; height: 40px; background: rgba(255,255,255,0.05); color: #fff; border-radius: 12px; padding: 0; margin: 0; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>ANMON CONTROL</h1>
    
    <div class="pin-box">
        <div id="pin-display">------</div>
    </div>

    <button class="btn-main" onclick="generatePin()">Generar Nueva Llave</button>
    <button class="btn-act" id="btn-act" onclick="activatePin()">Activar e Inyectar</button>

    <div class="list-container">
        <h3>Llaves en Sistema</h3>
        <div id="pin-list"></div>
    </div>

    <button class="btn-purge" onclick="purgeExpired()">Limpieza Profunda</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000)
        });
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "------";
    };

    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        const now = Date.now();

        if (data) {
            for (let key in data) {
                let infoText = "";
                let isExpired = false;

                if (data[key].expires) {
                    const timeLeft = data[key].expires - now;
                    const daysLeft = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
                    isExpired = timeLeft < 0;
                    infoText = isExpired ? "VENCIDO" : `Quedan ${daysLeft} días`;
                } else {
                    infoText = "SIN FECHA (Legacy)";
                }

                const div = document.createElement('div');
                div.className = "item";
                div.innerHTML = `
                    <div>
                        <div class="pin-text">${key}</div>
                        <span class="days-text ${isExpired ? 'expired-text' : ''}">${infoText}</span>
                    </div>
                    <button class="btn-del" onclick="deletePin('${key}')">✕</button>
                `;
                listDiv.appendChild(div);
            }
        }
    });

    window.deletePin = (key) => { if(confirm("¿Eliminar llave " + key + "?")) remove(ref(db, 'valid_pins/' + key)); };

    window.purgeExpired = async () => {
        const snapshot = await get(ref(db, 'valid_pins'));
        const data = snapshot.val();
        const now = Date.now();
        if (data) {
            for (let key in data) {
                if (data[key].expires && data[key].expires < now) await remove(ref(db, 'valid_pins/' + key));
            }
            alert("SISTEMA DEPURADO");
        }
    };
</script>
</body>
</html>
