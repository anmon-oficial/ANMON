<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON | OS Core</title>
    <style>
        /* RESET TOTAL PARA EVITAR ZOOM */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, system-ui, sans-serif;
        }
        
        body { 
            background: #000000; color: #ffffff; 
            padding: 20px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; width: 100vw; overflow-x: hidden;
        }

        .header { margin-top: 40px; text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; font-weight: 800; letter-spacing: 8px; text-transform: uppercase; }
        .header p { color: #007aff; font-size: 10px; letter-spacing: 4px; font-weight: 900; margin-top: 5px; }

        /* PANEL DE CONTROL PRINCIPAL */
        .admin-card { 
            background: #121214; width: 100%; max-width: 360px;
            padding: 40px 20px; border-radius: 28px;
            border: 1px solid #222; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        #pin-display { 
            font-size: 55px; font-weight: 200; letter-spacing: 8px; 
            color: #fff; margin-bottom: 30px; font-family: monospace;
        }

        .btn { 
            width: 100%; padding: 18px; border-radius: 14px; border: none; 
            font-weight: 800; font-size: 14px; text-transform: uppercase; 
            letter-spacing: 1px; cursor: pointer; transition: 0.2s;
        }
        .btn-gen { background: #ffffff; color: #000; margin-bottom: 12px; }
        .btn-inj { background: #007aff; color: #fff; display: none; }

        /* LISTADO DE TERMINALES */
        .list-title { 
            width: 100%; max-width: 360px; font-size: 13px; color: #666; 
            text-transform: uppercase; letter-spacing: 2px; 
            margin: 40px 0 15px; font-weight: 800; padding-left: 10px;
        }
        
        .item { 
            background: #111; width: 100%; max-width: 360px;
            padding: 20px; border-radius: 20px; 
            margin-bottom: 12px; display: flex; 
            justify-content: space-between; align-items: center;
            border: 1px solid #1f1f1f;
        }

        .item-code { font-size: 22px; font-weight: 600; color: #fff; }
        .item-status { font-size: 10px; color: #007aff; font-weight: 900; margin-top: 3px; }
        
        .btn-del { 
            background: #1c1c1e; color: #ff3b30; 
            width: 40px; height: 40px; border-radius: 10px; 
            border: 1px solid #2c2c2e; font-size: 18px;
        }

        .btn-purge { 
            background: transparent; color: #333; font-size: 10px; 
            letter-spacing: 2px; border: none; cursor: pointer; margin: 40px 0;
            text-transform: uppercase; font-weight: 700;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>ANMON</h1>
    <p>OS CORE CONTROL</p>
</div>

<div class="admin-card">
    <div id="pin-display">000000</div>
    <button class="btn btn-gen" onclick="generatePin()">Nuevo Acceso</button>
    <button class="btn btn-inj" id="btn-act" onclick="activatePin()">Inyectar PIN</button>
</div>

<div class="list-title">Terminales Verificados</div>
<div id="pin-list" style="width: 100%; max-width: 360px;"></div>

<button class="btn-purge" onclick="purgeExpired()">— Limpiar Expirados —</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('pin-display').style.color = "#007aff";
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000)
        });
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "000000";
        document.getElementById('pin-display').style.color = "#fff";
    };

    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            for (let key in data) {
                const days = Math.floor((data[key].expires - Date.now()) / (1000 * 60 * 60 * 24));
                const status = days < 0 ? "EXPIRADO" : `${days} DÍAS RESTANTES`;
                const div = document.createElement('div');
                div.className = "item";
                div.innerHTML = `<div><div class="item-code">${key}</div><div class="item-status">${status}</div></div><button class="btn-del" onclick="deletePin('${key}')">✕</button>`;
                listDiv.appendChild(div);
            }
        }
    });

    window.deletePin = (key) => { if(confirm("¿Eliminar?")) remove(ref(db, 'valid_pins/' + key)); };
    window.purgeExpired = async () => {
        const snap = await get(ref(db, 'valid_pins'));
        const data = snap.val();
        if(data) {
            for(let key in data) if(data[key].expires < Date.now()) await remove(ref(db, 'valid_pins/' + key));
            alert("SISTEMA DEPURADO");
        }
    };
</script>
</body>
</html>
