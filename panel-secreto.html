<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANMON | Admin</title>
    <style>
        body { background: #000; color: #00ffff; font-family: monospace; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 450px; width: 100%; border: 1px solid #00ffff; padding: 30px; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 255, 255, 0.1); }
        h2 { text-align: center; letter-spacing: 5px; }
        input { background: #111; border: 1px solid #00ffff; color: #fff; padding: 15px; width: 100%; box-sizing: border-box; margin-bottom: 15px; border-radius: 10px; font-size: 18px; text-align: center; outline: none; }
        button { background: #00ffff; color: #000; border: none; padding: 16px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 15px; margin-bottom: 12px; }
        .btn-master-clear { background: #440000; color: #ff4444; margin-top: 40px; border: 1px solid #ff4444; }
        .pin-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; border-bottom: 1px solid #111; color: #fff; }
        .del-btn { color: #ff4444; cursor: pointer; border: 1px solid #ff4444; padding: 5px 10px; border-radius: 6px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>ANMON ADMIN</h2>
        <button style="background:#002222; color:#00ffff; border:1px solid #00ffff" onclick="generatePin()">GENERAR PIN ALEATORIO</button>
        <input type="text" id="pin-input" placeholder="CÓDIGO">
        <button onclick="createPin()">ACTIVAR PIN</button>

        <div id="pin-display" style="margin-top:20px"></div>

        <button class="btn-master-clear" onclick="masterClear()">BORRADO TOTAL DE MENSAJES</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
            authDomain: "anmon-c2f58.firebaseapp.com",
            databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
            projectId: "anmon-c2f58",
            storageBucket: "anmon-c2f58.appspot.com",
            messagingSenderId: "438785819225",
            appId: "1:438785819225:web:67b93ab0c2cbc519926748"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.generatePin = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let res = ''; for (let i = 0; i < 6; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('pin-input').value = res;
        };

        window.createPin = () => {
            const pin = document.getElementById('pin-input').value.trim().toUpperCase();
            if(pin) set(ref(db, 'valid_pins/' + pin), { status: "active" }).then(() => document.getElementById('pin-input').value = "");
        };

        onValue(ref(db, 'valid_pins'), (snap) => {
            const list = document.getElementById('pin-display'); list.innerHTML = "";
            snap.forEach(child => {
                const div = document.createElement('div'); div.className = "pin-item";
                div.innerHTML = `<span>${child.key}</span><span class="del-btn" onclick="deletePin('${child.key}')">BORRAR</span>`;
                list.appendChild(div);
            });
        });

        window.deletePin = (p) => confirm("¿Borrar?") && remove(ref(db, 'valid_pins/' + p));
        window.masterClear = async () => confirm("¿BORRAR TODO?") && await remove(ref(db, 'messages'));
    </script>
</body>
</html>
