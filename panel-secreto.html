<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ANMON | Panel de Control</title>
    <style>
        body { background: #000; color: #00ffff; font-family: monospace; padding: 30px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; border: 1px solid #00ffff; padding: 25px; border-radius: 15px; box-shadow: 0 0 20px #004444; }
        input { background: #111; border: 1px solid #00ffff; color: #fff; padding: 12px; width: 100%; box-sizing: border-box; margin-bottom: 15px; border-radius: 8px; font-size: 16px; }
        button { background: #00ffff; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        .btn-random { background: #004444; color: #00ffff; border: 1px solid #00ffff; margin-bottom: 15px; }
        .list { margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; }
        .pin-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #111; color: #fff; }
        .del-btn { color: #ff4444; cursor: pointer; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>ANMON MASTER PANEL</h2>
        <p>Escribí un código o generá uno:</p>
        
        <button class="btn-random" onclick="generateRandomPin()">🎲 GENERAR CÓDIGO ALAZAR</button>
        
        <input type="text" id="pin-input" placeholder="Ej: 12345678">
        <button onclick="createPin()">ACTIVAR PIN</button>

        <div class="list">
            <h3>PINs que están funcionando:</h3>
            <div id="pin-list">Cargando...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Tu configuración original (No se toca)
        const firebaseConfig = {
            apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
            authDomain: "anmon-c2f58.firebaseapp.com",
            databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
            projectId: "anmon-c2f58",
            storageBucket: "anmon-c2f58.appspot.com",
            messagingSenderId: "438785819225",
            appId: "1:438785819225:web:67b93ab0c2cbc519926748"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Función para generar PIN aleatorio de 6 caracteres
        window.generateRandomPin = function() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // Saqué el '0' y la 'O' para evitar confusiones
            let result = '';
            for (let i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('pin-input').value = result;
        }

        // Función original para crear PIN
        window.createPin = function() {
            const pin = document.getElementById('pin-input').value.trim();
            if(!pin) return alert("Escribí algo primero");
            set(ref(db, 'valid_pins/' + pin), { status: "active" })
            .then(() => {
                alert("¡PIN " + pin + " ACTIVADO!");
                document.getElementById('pin-input').value = "";
            });
        }

        // Mostrar lista de PINs activos
        onValue(ref(db, 'valid_pins'), (snap) => {
            const list = document.getElementById('pin-list');
            list.innerHTML = "";
            if(!snap.exists()) { list.innerHTML = "No hay PINs activos"; return; }
            snap.forEach(child => {
                const p = child.key;
                const div = document.createElement('div');
                div.className = "pin-item";
                div.innerHTML = `<span>${p}</span><span class="del-btn" onclick="deletePin('${p}')">ELIMINAR</span>`;
                list.appendChild(div);
            });
        });

        // Borrar PIN
        window.deletePin = function(p) {
            if(confirm("¿Querés desactivar el código " + p + "?")) {
                remove(ref(db, 'valid_pins/' + p));
            }
        }
    </script>
</body>
</html>
