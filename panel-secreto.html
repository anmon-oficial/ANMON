<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANMON | System Administration</title>
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --text: #ffffff; --border: #262626; --accent: #ffffff; --danger: #cc0000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; display: flex; justify-content: center; min-height: 100vh; }

        .admin-container { max-width: 440px; width: 100%; }

        header { text-align: center; margin-bottom: 50px; }
        .brand { font-size: 32px; font-weight: 200; letter-spacing: 15px; color: var(--text); margin: 0; }
        .status-tag { font-size: 10px; letter-spacing: 4px; color: #666; text-transform: uppercase; margin-top: 10px; font-weight: 700; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin-bottom: 20px; }

        .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; font-weight: 700; display: block; }

        input { 
            background: #000; border: 1px solid var(--border); color: var(--text); 
            padding: 18px; width: 100%; border-radius: 8px; 
            font-size: 22px; text-align: center; outline: none; font-weight: 300; letter-spacing: 8px;
            margin-bottom: 20px; transition: border 0.3s;
        }
        input:focus { border-color: #444; }

        button { 
            background: var(--text); color: #000; border: none; padding: 18px; 
            width: 100%; font-weight: 700; cursor: pointer; border-radius: 8px; 
            font-size: 13px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-outline:hover { background: #1a1a1a; }

        .monitor-list { border-top: 1px solid var(--border); margin-top: 10px; }
        .pin-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px 0; border-bottom: 1px solid var(--border); 
        }
        .pin-code { font-weight: 600; letter-spacing: 2px; font-size: 16px; color: #eee; }
        .pin-meta { font-size: 11px; color: #555; font-weight: 600; }
        
        .revocar { color: var(--danger); cursor: pointer; font-size: 11px; font-weight: 700; text-transform: uppercase; }

        .footer-tools { margin-top: 40px; text-align: center; }
        .nuke-link { color: #444; font-size: 11px; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: color 0.3s; }
        .nuke-link:hover { color: var(--danger); }
    </style>
</head>
<body>
    <div class="admin-container">
        <header>
            <h1 class="brand">ANMON</h1>
            <div class="status-tag">Management System</div>
        </header>

        <div class="card">
            <span class="label">Control de Accesos</span>
            <button class="btn-outline" onclick="generatePin()">Generar Nueva Llave</button>
            <input type="text" id="pin-input" placeholder="------" maxlength="6" readonly>
            <button onclick="createPin()">Autorizar Conexión</button>
        </div>

        <div class="card">
            <span class="label">Conexiones Activas</span>
            <div id="pin-display" class="monitor-list">
                </div>
        </div>

        <div class="footer-tools">
            <span class="nuke-link" onclick="masterClear()">Protocolo de Limpieza Global</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
            authDomain: "anmon-c2f58.firebaseapp.com",
            databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
            projectId: "anmon-c2f58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.generatePin = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let res = ''; 
            for (let i = 0; i < 6; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('pin-input').value = res;
        };

        window.createPin = () => {
            const pin = document.getElementById('pin-input').value;
            if(!pin) return;
            set(ref(db, 'valid_pins/' + pin), { 
                st: "active", 
                ts: Date.now(),
                ex: Date.now() + (45 * 24 * 60 * 60 * 1000)
            }).then(() => {
                document.getElementById('pin-input').value = "";
            });
        };

        onValue(ref(db, 'valid_pins'), (snap) => {
            const list = document.getElementById('pin-display'); 
            list.innerHTML = "";
            if(!snap.exists()) {
                list.innerHTML = "<div style='padding:20px; color:#444; text-align:center; font-size:12px;'>SISTEMA EN ESPERA</div>";
                return;
            }
            snap.forEach(child => {
                const div = document.createElement('div'); div.className = "pin-row";
                div.innerHTML = `
                    <span class="pin-code">${child.key}</span>
                    <span class="pin-meta">45 DÍAS</span>
                    <span class="revocar" onclick="deletePin('${child.key}')">Revocar</span>`;
                list.appendChild(div);
            });
        });

        window.deletePin = (p) => confirm("¿Desea revocar este acceso?") && remove(ref(db, 'valid_pins/' + p));
        
        window.masterClear = async () => {
            if(confirm("CONFIRMAR LIMPIEZA GLOBAL: Se borrarán todos los registros de conversación.")) {
                await remove(ref(db, 'rooms'));
                alert("SISTEMA DEPURADO");
            }
        };
    </script>
</body>
</html>
