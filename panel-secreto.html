<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANMON | System Administration</title>
    <style>
        :root { --bg: #0a0a0a; --card: #111; --text: #ffffff; --border: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Helvetica', sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; display: flex; justify-content: center; min-height: 100vh; }

        .admin-container { max-width: 480px; width: 100%; }

        header { text-align: center; margin-bottom: 40px; }
        .brand { font-size: 42px; font-weight: 900; letter-spacing: 14px; color: var(--text); margin: 0; }
        .status-tag { font-size: 12px; letter-spacing: 4px; color: #888; text-transform: uppercase; margin-top: 10px; font-weight: bold; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 35px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }

        .label { font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; font-weight: 800; display: block; text-align: center; }

        input { 
            background: #000; border: 2px solid var(--border); color: #fff; 
            padding: 22px; width: 100%; border-radius: 14px; 
            font-size: 30px; text-align: center; outline: none; font-weight: bold; letter-spacing: 6px;
            margin-bottom: 25px; transition: border 0.3s;
        }
        input:focus { border-color: #666; }

        button { 
            background: #fff; color: #000; border: none; padding: 22px; 
            width: 100%; font-weight: 900; cursor: pointer; border-radius: 14px; 
            font-size: 16px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-outline { background: transparent; color: #fff; border: 2px solid var(--border); }

        .pin-list { margin-top: 10px; }
        .pin-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 0; border-bottom: 1px solid var(--border); 
        }
        .pin-code { font-weight: 800; letter-spacing: 3px; font-size: 24px; color: #fff; }
        
        .revocar { 
            color: #ff3333; cursor: pointer; font-size: 11px; font-weight: 800; 
            text-transform: uppercase; border: 1px solid #ff3333; padding: 8px 14px; border-radius: 8px; 
        }

        .footer-tools { margin-top: 50px; text-align: center; }
        .nuke-link { color: #444; font-size: 12px; font-weight: bold; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="admin-container">
        <header>
            <h1 class="brand">ANMON</h1>
            <div class="status-tag">Centro de Mando</div>
        </header>

        <div class="card">
            <span class="label">Emisión de Nueva Llave</span>
            <button class="btn-outline" onclick="generatePin()">Generar Código</button>
            <input type="text" id="pin-input" placeholder="------" maxlength="10">
            <button onclick="createPin()">Activar e Inyectar</button>
        </div>

        <div class="card">
            <span class="label">Llaves en Sistema</span>
            <div id="pin-display" class="pin-list"></div>
        </div>

        <div class="footer-tools">
            <span class="nuke-link" onclick="masterClear()">Eliminar Historial de Mensajes</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
            authDomain: "anmon-c2f58.firebaseapp.com",
            databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
            projectId: "anmon-c2f58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Generar PIN de 6 dígitos alfanuméricos
        window.generatePin = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let res = ''; 
            for (let i = 0; i < 6; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('pin-input').value = res;
        };

        // Guardar PIN en Firebase
        window.createPin = () => {
            const pin = document.getElementById('pin-input').value.toUpperCase().trim();
            if(!pin) return;
            set(ref(db, 'valid_pins/' + pin), { 
                ts: Date.now(),
                ex: Date.now() + (45 * 24 * 60 * 60 * 1000)
            }).then(() => {
                document.getElementById('pin-input').value = "";
            });
        };

        // Escuchar los pines activos
        onValue(ref(db, 'valid_pins'), (snap) => {
            const list = document.getElementById('pin-display'); 
            list.innerHTML = "";
            if(!snap.exists()) {
                list.innerHTML = "<div style='padding:20px; color:#444; text-align:center;'>SIN ACCESOS</div>";
                return;
            }
            snap.forEach(child => {
                const div = document.createElement('div'); div.className = "pin-row";
                div.innerHTML = `
                    <span class="pin-code">${child.key}</span>
                    <span class="revocar" onclick="deletePin('${child.key}')">Revocar</span>`;
                list.appendChild(div);
            });
        });

        window.deletePin = (p) => confirm("¿Revocar acceso?") && remove(ref(db, 'valid_pins/' + p));
        
        window.masterClear = async () => {
            if(confirm("¿BORRAR TODOS LOS MENSAJES?")) {
                await remove(ref(db, 'rooms'));
                alert("SISTEMA LIMPIO");
            }
        };
    </script>
</body>
</html>
