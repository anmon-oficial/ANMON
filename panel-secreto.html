<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANMON - Panel de Control</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; max-width: 500px; margin: auto; }
        h1 { letter-spacing: 5px; color: #00f3ff; }
        #pin-display { font-size: 48px; font-weight: 900; margin: 20px 0; color: #fff; background: #222; padding: 10px; border-radius: 10px; }
        button { background: #00f3ff; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; }
        .btn-purge { background: #ff3b30; color: #fff; margin-top: 30px; }
        .list { margin-top: 30px; text-align: left; }
        .item { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #00f3ff; }
        .expired { border-left-color: #ff3b30; opacity: 0.6; }
        .info { font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h1>ANMON CONTROL</h1>
    <div id="pin-display">------</div>
    <button onclick="generatePin()">GENERAR NUEVA LLAVE</button>
    <button onclick="activatePin()" id="btn-act" style="display:none; background:#fff;">ACTIVAR E INYECTAR</button>

    <div class="list">
        <h3>LLAVES EN SISTEMA (45 DÍAS)</h3>
        <div id="pin-list"></div>
    </div>

    <button class="btn-purge" onclick="purgeExpired()">LIMPIEZA PROFUNDA (BORRAR VENCIDOS)</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000)
        });
        alert("LLAVE " + tempPin + " ACTIVADA");
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "------";
    };

    // MOSTRAR LLAVES Y CALCULAR VENCIMIENTO
    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        const now = Date.now();

        if (data) {
            for (let key in data) {
                const timeLeft = data[key].expires - now;
                const daysLeft = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
                const isExpired = timeLeft < 0;

                const div = document.createElement('div');
                div.className = "item " + (isExpired ? "expired" : "");
                div.innerHTML = `
                    <div>
                        <strong>${key}</strong><br>
                        <span class="info">${isExpired ? "VENCIDO" : "Quedan " + daysLeft + " días"}</span>
                    </div>
                    <button onclick="deletePin('${key}')" style="width:auto; padding:5px 10px; background:#444; color:#fff;">X</button>
                `;
                listDiv.appendChild(div);
            }
        }
    });

    window.deletePin = (key) => {
        if(confirm("¿Eliminar llave " + key + "?")) remove(ref(db, 'valid_pins/' + key));
    };

    window.purgeExpired = async () => {
        const snapshot = await get(ref(db, 'valid_pins'));
        const data = snapshot.val();
        const now = Date.now();
        let count = 0;

        if (data) {
            for (let key in data) {
                if (data[key].expires < now) {
                    await remove(ref(db, 'valid_pins/' + key));
                    count++;
                }
            }
            alert("SE ELIMINARON " + count + " LLAVES VENCIDAS");
        }
    };
</script>
</body>
</html>
