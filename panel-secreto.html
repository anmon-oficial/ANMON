<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANMON - Executive Control</title>
    <style>
        :root { --accent: #00f3ff; --bg: #000; --card: #121212; --danger: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Helvetica Neue', Helvetica, sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .header { margin-top: 30px; text-align: center; width: 100%; }
        .header h1 { font-weight: 900; letter-spacing: 12px; font-size: 28px; margin: 0; color: #fff; }
        .header p { color: var(--accent); font-size: 10px; letter-spacing: 4px; text-transform: uppercase; margin-top: 8px; opacity: 0.8; }

        /* BOX PRINCIPAL */
        .main-card { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); width: 100%; max-width: 400px; padding: 40px 20px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.08); margin-top: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        #pin-display { font-size: 55px; font-weight: 900; letter-spacing: 6px; color: var(--accent); margin-bottom: 30px; text-shadow: 0 0 20px rgba(0,243,255,0.4); }

        /* BOTONES ACCIÓN */
        .btn { width: 100%; padding: 22px; border-radius: 20px; border: none; font-weight: 900; font-size: 15px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .btn-gen { background: #fff; color: #000; margin-bottom: 15px; }
        .btn-inj { background: var(--accent); color: #000; display: none; box-shadow: 0 0 25px rgba(0,243,255,0.3); }

        /* SECCIÓN LISTADO */
        .list-section { width: 100%; max-width: 400px; margin-top: 40px; flex: 1; }
        .list-section h3 { font-size: 11px; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: 20px; text-align: center; }
        
        .item { background: #111; padding: 20px; border-radius: 25px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .item-info .pin { font-size: 20px; font-weight: 800; letter-spacing: 2px; display: block; }
        .item-info .status { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-top: 4px; }
        
        .btn-del { width: 45px; height: 45px; background: rgba(255,59,48,0.1); color: var(--danger); border-radius: 15px; border: none; font-size: 18px; font-weight: bold; }

        /* BOTÓN PURGA */
        .btn-purge { background: rgba(255,255,255,0.03); color: #444; border: 1px solid #222; margin: 40px 0; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <h1>ANMON</h1>
    <p>Control Center</p>
</div>

<div class="main-card">
    <div id="pin-display">------</div>
    <button class="btn btn-gen" onclick="generatePin()">Generar Acceso</button>
    <button class="btn btn-inj" id="btn-act" onclick="activatePin()">Inyectar en Sistema</button>
</div>

<div class="list-section">
    <h3>Terminales Activos</h3>
    <div id="pin-list"></div>
</div>

<button class="btn btn-purge" onclick="purgeExpired()">Depurar Llaves Vencidas</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000)
        });
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "------";
    };

    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        const now = Date.now();

        if (data) {
            for (let key in data) {
                let status = "Activo";
                if (data[key].expires) {
                    const days = Math.floor((data[key].expires - now) / (1000 * 60 * 60 * 24));
                    status = days < 0 ? "Vencido" : `Vence en ${days} días`;
                }

                const div = document.createElement('div');
                div.className = "item";
                div.innerHTML = `
                    <div class="item-info">
                        <span class="pin">${key}</span>
                        <span class="status">${status}</span>
                    </div>
                    <button class="btn-del" onclick="deletePin('${key}')">×</button>
                `;
                listDiv.appendChild(div);
            }
        }
    });

    window.deletePin = (key) => { if(confirm("¿ELIMINAR LLAVE?")) remove(ref(db, 'valid_pins/' + key)); };

    window.purgeExpired = async () => {
        const snapshot = await get(ref(db, 'valid_pins'));
        const data = snapshot.val();
        if (data) {
            for (let key in data) {
                if (data[key].expires && data[key].expires < Date.now()) await remove(ref(db, 'valid_pins/' + key));
            }
            alert("DEPURACIÓN COMPLETADA");
        }
    };
</script>
</body>
</html>
