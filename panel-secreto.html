<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANMON | Core</title>
    <style>
        :root { --accent: #00f3ff; --bg: #000; --panel: rgba(20, 20, 20, 0.8); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
            color: #fff; margin: 0; padding: 20px; 
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header { margin-top: 40px; text-align: center; }
        .header h1 { font-weight: 200; letter-spacing: 15px; font-size: 26px; margin: 0; }
        .header span { color: var(--accent); font-size: 9px; letter-spacing: 5px; text-transform: uppercase; font-weight: 800; }

        /* EL BÚNKER DE CONTROL */
        .glass-card { 
            background: var(--panel);
            width: 100%; max-width: 380px;
            padding: 35px 25px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            margin-top: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        #pin-display { 
            font-size: 50px; font-weight: 200; letter-spacing: 10px; 
            color: #fff; text-align: center; margin-bottom: 35px;
            font-variant-numeric: tabular-nums;
        }

        /* BOTONES DE LUJO */
        .btn { 
            width: 100%; padding: 20px; border-radius: 22px; border: none; 
            font-weight: 700; font-size: 13px; text-transform: uppercase; 
            letter-spacing: 2px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-gen { background: #fff; color: #000; margin-bottom: 12px; }
        .btn-gen:active { background: #ccc; transform: scale(0.97); }
        
        .btn-inj { 
            background: var(--accent); color: #000; display: none; 
            box-shadow: 0 10px 20px rgba(0, 243, 255, 0.2); 
        }

        /* LISTADO DE ACCESOS */
        .list-title { font-size: 10px; color: #444; letter-spacing: 4px; text-transform: uppercase; margin: 40px 0 15px; font-weight: 900; }
        
        .access-item { 
            background: rgba(255,255,255,0.03); 
            width: 100%; max-width: 380px;
            padding: 20px 25px; border-radius: 25px; 
            margin-bottom: 10px; display: flex; 
            justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .access-item .pin-code { font-size: 18px; font-weight: 300; letter-spacing: 3px; }
        .access-item .info { font-size: 10px; color: var(--accent); font-weight: 700; margin-top: 2px; }
        
        .btn-del { 
            background: rgba(255,255,255,0.05); color: #666; 
            width: 35px; height: 35px; border-radius: 12px; border: none; font-size: 14px;
        }

        .purge-area { margin-top: auto; padding: 40px 0; }
        .btn-purge { background: transparent; color: #333; font-size: 10px; text-transform: uppercase; letter-spacing: 3px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>ANMON</h1>
    <span>Control Center</span>
</div>

<div class="glass-card">
    <div id="pin-display">000000</div>
    <button class="btn btn-gen" onclick="generatePin()">Nuevo Acceso</button>
    <button class="btn btn-inj" id="btn-act" onclick="activatePin()">Inyectar Llave</button>
</div>

<div class="list-title">Terminales Verificados</div>
<div style="width: 100%; max-width: 380px;" id="pin-list"></div>

<div class="purge-area">
    <button class="btn-purge" onclick="purgeExpired()">— Depuración de Ciclo —</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('pin-display').style.fontWeight = "600";
        document.getElementById('pin-display').style.color = "var(--accent)";
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000)
        });
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "000000";
        document.getElementById('pin-display').style.fontWeight = "200";
        document.getElementById('pin-display').style.color = "#fff";
    };

    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            for (let key in data) {
                let status = "Activo";
                if (data[key].expires) {
                    const days = Math.floor((data[key].expires - Date.now()) / (1000 * 60 * 60 * 24));
                    status = days < 0 ? "Expirado" : `${days} Días Restantes`;
                }
                const div = document.createElement('div');
                div.className = "access-item";
                div.innerHTML = `
                    <div>
                        <div class="pin-code">${key}</div>
                        <div class="info">${status}</div>
                    </div>
                    <button class="btn-del" onclick="deletePin('${key}')">✕</button>
                `;
                listDiv.appendChild(div);
            }
        }
    });

    window.deletePin = (key) => { if(confirm("¿Eliminar acceso?")) remove(ref(db, 'valid_pins/' + key)); };
    window.purgeExpired = async () => {
        const snap = await get(ref(db, 'valid_pins'));
        const data = snap.val();
        if(data) {
            for(let key in data) if(data[key].expires && data[key].expires < Date.now()) await remove(ref(db, 'valid_pins/' + key));
            alert("CICLO DEPURADO");
        }
    };
</script>
</body>
</html>
