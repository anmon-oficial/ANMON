<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON | OS Core</title>
    <style>
        :root { --bg: #000; --card: #111; --accent: #007aff; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 25px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { margin-top: 50px; text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 26px; letter-spacing: 12px; font-weight: 800; margin: 0; }
        .header p { color: var(--accent); font-size: 10px; letter-spacing: 5px; font-weight: 700; text-transform: uppercase; margin-top: 8px; }

        .control-box { background: var(--card); width: 100%; max-width: 380px; padding: 45px 25px; border-radius: 28px; border: 1px solid #222; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        #pin-display { font-size: 55px; font-weight: 200; letter-spacing: 10px; margin-bottom: 35px; font-family: monospace; }
        
        .btn { width: 100%; padding: 20px; border-radius: 16px; border: none; font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s; }
        .btn-main { background: #fff; color: #000; margin-bottom: 12px; }
        .btn-sub { background: var(--accent); color: #fff; display: none; }

        .label { width: 100%; max-width: 380px; font-size: 12px; color: #666; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin: 45px 0 15px 10px; border-left: 3px solid var(--accent); padding-left: 10px; }
        .item { background: #0a0a0a; width: 100%; max-width: 380px; padding: 22px; border-radius: 20px; border: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .item-pin { font-size: 22px; font-weight: 600; letter-spacing: 2px; color: #fff; }
        .item-info { font-size: 10px; color: var(--accent); font-weight: 900; margin-top: 4px; }
        .btn-del { background: #1c1c1e; color: #ff3b30; width: 45px; height: 45px; border-radius: 12px; border: 1px solid #2c2c2e; font-size: 18px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>ANMON</h1>
        <p>OS CORE CONTROL</p>
    </div>
    <div class="control-box">
        <div id="pin-display">000000</div>
        <button class="btn btn-main" onclick="generatePin()">Nuevo Acceso</button>
        <button class="btn btn-sub" id="btn-act" onclick="activatePin()">Inyectar en Red</button>
    </div>
    <div class="label">Terminales Activos</div>
    <div id="pin-list" style="width: 100%; max-width: 380px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0", authDomain: "anmon-c2f58.firebaseapp.com", databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com", projectId: "anmon-c2f58" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let tP = "";

        window.generatePin = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            tP = '';
            for (let i = 0; i < 6; i++) tP += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('pin-display').innerText = tP;
            document.getElementById('pin-display').style.color = "var(--accent)";
            document.getElementById('btn-act').style.display = 'block';
        };

        window.activatePin = async () => {
            const expire = Date.now() + (45 * 24 * 60 * 60 * 1000);
            await set(ref(db, 'valid_pins/' + tP), { expires: expire });
            document.getElementById('btn-act').style.display = 'none';
            document.getElementById('pin-display').innerText = "000000";
            document.getElementById('pin-display').style.color = "#fff";
        };

        onValue(ref(db, 'valid_pins'), (s) => {
            const list = document.getElementById('pin-list'); list.innerHTML = "";
            const d = s.val(); 
            if(d) {
                Object.keys(d).forEach(k => {
                    const expireDate = d[k].expires || (Date.now() + 3888000000);
                    const days = Math.floor((expireDate - Date.now()) / (1000 * 60 * 60 * 24));
                    const status = days < 0 ? "EXPIRADO" : `${days} DÍAS RESTANTES`;
                    const div = document.createElement('div'); div.className = "item";
                    div.innerHTML = `<div><div class="item-pin">${k}</div><div class="item-info">${status}</div></div><button class="btn-del" onclick="remove(ref(db, 'valid_pins/${k}'))">✕</button>`;
                    list.appendChild(div);
                });
            }
        });
    </script>
</body>
</html>
