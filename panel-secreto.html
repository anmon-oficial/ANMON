<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANMON | Core Admin</title>
    <style>
        :root {
            --accent: #00f3ff; /* Cian Brillante */
            --bg-gradient: radial-gradient(circle at top, #2c2c2c 0%, #000 100%);
            --panel-bg: rgba(30, 30, 30, 0.95);
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa; /* Gris Claro - Visible */
            --text-muted: #666666;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-gradient);
            color: var(--text-primary);
            margin: 0; padding: 20px; 
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* HEADER - Más espaciado y elegante */
        .header { margin-top: 50px; text-align: center; margin-bottom: 20px; }
        .header h1 { font-weight: 200; letter-spacing: 15px; font-size: 28px; margin: 0; text-transform: uppercase; }
        .header span { color: var(--accent); font-size: 11px; letter-spacing: 5px; text-transform: uppercase; font-weight: 800; }

        /* PANEL CENTRAL - Con mejor sombreado */
        .glass-card { 
            background: var(--panel-bg);
            width: 100%; max-width: 380px;
            padding: 35px 25px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-top: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        #pin-display { 
            font-size: 60px; font-weight: 200; letter-spacing: 12px; 
            color: var(--text-primary); text-align: center; margin-bottom: 35px;
            font-variant-numeric: tabular-nums;
        }

        /* BOTONES - Más grandes y legibles */
        .btn { 
            width: 100%; padding: 22px; border-radius: 25px; border: none; 
            font-weight: 700; font-size: 14px; text-transform: uppercase; 
            letter-spacing: 2.5px; cursor: pointer; transition: all 0.3s ease;
            font-family: inherit;
        }
        .btn-gen { background: #ffffff; color: #000000; margin-bottom: 15px; }
        .btn-gen:active { background: #e0e0e0; transform: scale(0.98); }
        
        .btn-act { 
            background: var(--accent); color: #000000; display: none; 
            box-shadow: 0 10px 25px rgba(0, 243, 255, 0.4); 
        }
        .btn-act:active { transform: scale(0.98); }

/* LISTADO DE ACCESOS - VISIBILIDAD MEJORADA */
        .list-container {
            width: 100%; max-width: 380px;
            margin-top: 40px;
            display: flex; flex-direction: column; align-items: center;
        }

        .list-title { 
            font-size: 11px; color: var(--text-secondary); /* ¡VISIBLE! */
            letter-spacing: 4px; text-transform: uppercase; 
            margin-bottom: 15px; font-weight: 900;
            width: 100%; text-align: left; padding-left: 10px;
        }
        
        .access-item { 
            background: rgba(255,255,255,0.04); 
            width: 100%; padding: 22px 25px; border-radius: 25px; 
            margin-bottom: 12px; display: flex; 
            justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(5px);
        }
        .access-item:hover { border-color: rgba(0, 243, 255, 0.2); background: rgba(255,255,255,0.06); }

        .pin-code { font-size: 20px; font-weight: 300; letter-spacing: 3px; color: #fff; }
        .status { font-size: 10px; color: var(--accent); font-weight: 700; margin-top: 3px; }
        
        /* BOTÓN BORRAR - Mejor contraste */
        .btn-del { 
            background: rgba(255,255,255,0.1); color: #fff; /* Gris claro */
            width: 35px; height: 35px; border-radius: 12px; border: none; font-size: 14px;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .btn-del:hover { background: rgba(255,0,0,0.2); color: #ff4444; }

        /* PIE DE PÁGINA - VISIBLE */
        .footer { margin-top: auto; padding: 40px 0; text-align: center; }
        .btn-purge { background: transparent; color: var(--text-muted); /* ¡VISIBLE! */ font-size: 10px; text-transform: uppercase; letter-spacing: 3px; border: none; cursor: pointer; }
        .btn-purge:hover { color: #ff4444; }
    </style>
</head>
<body>

<div class="header">
    <h1>ANMON</h1>
    <span>Control Center</span>
</div>

<div class="glass-card">
    <div id="pin-display">000000</div>
    <button class="btn btn-gen" onclick="generatePin()">Generar Nuevo Acceso</button>
    <button class="btn btn-act" id="btn-act" onclick="activatePin()">Inyectar en Sistema</button>
</div>

<div class="list-container">
    <div class="list-title">Terminales Verificados</div>
    <div style="width: 100%;" id="pin-list"></div>
</div>

<div class="footer">
    <button class="btn-purge" onclick="purgeExpired()">— Limpiar Expirados —</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('pin-display').style.color = "var(--accent)";
        document.getElementById('pin-display').style.fontWeight = "400";
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000)
        });
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "000000";
        document.getElementById('pin-display').style.color = "var(--text-primary)";
        document.getElementById('pin-display').style.fontWeight = "200";
    };

    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            // Convertir objeto a array para ordenar por fecha de creación (más nuevos primero)
            const pinsArray = [];
            for (let key in data) pinsArray.push({ key: key, ...data[key] });
            pinsArray.sort((a, b) => b.created - a.created);

            pinsArray.forEach((item) => {
                let statusStr = "ACTIVO";
                if (item.expires) {
                    const days = Math.floor((item.expires - Date.now()) / (1000 * 60 * 60 * 24));
                    statusStr = days < 0 ? "EXPIRADO" : `${days} DÍAS RESTANTES`;
                }
                const div = document.createElement('div');
                div.className = "access-item";
                div.innerHTML = `
                    <div>
                        <div class="pin-code">${item.key}</div>
                        <div class="status">${statusStr}</div>
                    </div>
                    <button class="btn-del" onclick="deletePin('${item.key}')">✕</button>
                `;
                listDiv.appendChild(div);
            });
        }
    });

    window.deletePin = (key) => { if(confirm(`¿Eliminar acceso ${key}?`)) remove(ref(db, 'valid_pins/' + key)); };
    window.purgeExpired = async () => {
        const snap = await get(ref(db, 'valid_pins'));
        const data = snap.val();
        if(data) {
            let contador = 0;
            for(let key in data) if(data[key].expires && data[key].expires < Date.now()) { await remove(ref(db, 'valid_pins/' + key)); contador++; }
            alert(`SISTEMA DEPURADO: ${contador} accesos expirados eliminados.`);
        } else { alert("No hay accesos para depurar."); }
    };
</script>
</body>
</html>
