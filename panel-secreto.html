<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANMON | CONTROL CENTER</title>
    <style>
        /* BASE BASADA EN TU LOGIN ORIGINAL */
        :root { --accent: #00f3ff; --bg: #0b0b0b; --card: #1c1c1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; margin: 0; padding: 20px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        /* HEADER IDENTICO AL LOGIN */
        .header { margin-top: 40px; text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 45px; font-weight: 900; letter-spacing: 12px; margin: 0; color: #fff; }
        .header .sub { color: var(--accent); font-size: 13px; letter-spacing: 6px; font-weight: 800; text-transform: uppercase; margin-top: 10px; }

        .container { width: 100%; max-width: 360px; }

        /* EL VISOR DE PIN - ESTILO CAJA DE TEXTO OSCURA */
        .visor { 
            background: #1c1c1e; padding: 30px; border-radius: 20px; 
            border: 1px solid #2c2c2e; text-align: center; margin-bottom: 15px;
            font-size: 36px; font-weight: 700; letter-spacing: 10px; color: var(--accent);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        /* BOTONES CON EL PESO Y FORMA ORIGINAL */
        .btn { 
            width: 100%; padding: 24px; border-radius: 20px; border: none; 
            font-weight: 800; font-size: 15px; text-transform: uppercase; 
            letter-spacing: 2px; cursor: pointer; margin-bottom: 15px;
            transition: transform 0.1s;
        }
        .btn-gen { background: #2c2c2e; color: #8e8e93; border: 1px solid #3a3a3c; }
        .btn-inj { background: #fff; color: #000; display: none; }
        .btn:active { transform: scale(0.98); }

        /* LISTADO DE LLAVES - ESTILO TARJETA REFORZADA */
        .label { font-size: 10px; color: #636366; letter-spacing: 3px; text-transform: uppercase; margin: 30px 0 15px; font-weight: 900; text-align: center; }
        
        .card-llave { 
            background: #1c1c1e; padding: 22px; border-radius: 20px; 
            border: 1px solid #2c2c2e; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-llave .pin { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: #fff; }
        .card-llave .meta { font-size: 11px; color: var(--accent); font-weight: 700; margin-top: 4px; text-transform: uppercase; }
        
        .btn-del { background: #2c2c2e; color: #ff453a; width: 44px; height: 44px; border-radius: 14px; border: none; font-weight: 900; font-size: 18px; }

        /* PURGA - DISCRETO ABAJO */
        .purge-link { margin-top: 40px; color: #48484a; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; font-weight: 700; cursor: pointer; border: none; background: none; width: 100%; }
    </style>
</head>
<body>

<div class="header">
    <h1>ANMON</h1>
    <div class="sub">BUNKER DIGITAL</div>
</div>

<div class="container">
    <div class="visor" id="pin-display">------</div>
    <button class="btn btn-gen" onclick="generatePin()">Nombre de Usuario</button> <button class="btn btn-gen" onclick="generatePin()">Generar Llave de Acceso</button>
    <button class="btn btn-inj" id="btn-act" onclick="activatePin()">Inyectar en Sistema</button>

    <div class="label">Terminales Verificados</div>
    <div id="pin-list"></div>

    <button class="purge-link" onclick="purgeExpired()">— Ejecutar Limpieza de Ciclo —</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000)
        });
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "------";
    };

    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            for (let key in data) {
                let info = "Acceso Activo";
                if (data[key].expires) {
                    const days = Math.floor((data[key].expires - Date.now()) / (1000 * 60 * 60 * 24));
                    info = days < 0 ? "Expirado" : `${days} Días Restantes`;
                }
                const div = document.createElement('div');
                div.className = "card-llave";
                div.innerHTML = `
                    <div>
                        <div class="pin">${key}</div>
                        <div class="meta">${info}</div>
                    </div>
                    <button class="btn-del" onclick="deletePin('${key}')">✕</button>
                `;
                listDiv.appendChild(div);
            }
        }
    });

    window.deletePin = (key) => { if(confirm("¿ELIMINAR ACCESO?")) remove(ref(db, 'valid_pins/' + key)); };
    window.purgeExpired = async () => {
        const snap = await get(ref(db, 'valid_pins'));
        const data = snap.val();
        if(data) {
            for(let key in data) if(data[key].expires && data[key].expires < Date.now()) await remove(ref(db, 'valid_pins/' + key));
            alert("SISTEMA DEPURADO");
        }
    };
</script>
</body>
</html>
