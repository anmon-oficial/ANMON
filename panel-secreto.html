<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANMON | Command Center</title>
    <style>
        :root { --accent: #00f3ff; --danger: #ff3333; --success: #00ff88; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { 
            background: radial-gradient(circle at 50% 50%, #121212 0%, #000 100%); 
            color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; 
        }

        .container { 
            max-width: 480px; width: 100%; 
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 30px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }

        h2 { text-align: center; letter-spacing: 12px; font-weight: 900; color: #fff; margin: 0; text-transform: uppercase; }
        .status-header { font-size: 10px; color: var(--accent); letter-spacing: 4px; text-align: center; margin-bottom: 40px; font-weight: bold; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #222; }
        .stat-val { display: block; font-size: 20px; font-weight: 900; color: var(--accent); }
        .stat-label { font-size: 9px; color: #777; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { position: relative; margin-bottom: 20px; }
        input { 
            background: #000; border: 1px solid #333; color: var(--accent); 
            padding: 20px; width: 100%; border-radius: 15px; 
            font-size: 24px; text-align: center; outline: none; font-weight: 900; letter-spacing: 6px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); }

        button { 
            background: var(--accent); color: #000; border: none; padding: 18px; 
            width: 100%; font-weight: 900; cursor: pointer; border-radius: 15px; 
            font-size: 13px; margin-bottom: 12px; transition: 0.2s; letter-spacing: 1px;
        }
        button:active { transform: scale(0.97); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: #eee; border: 1px solid #444; }

        .pin-list-container { margin-top: 30px; }
        .label-row { display: flex; justify-content: space-between; font-size: 10px; color: #555; text-transform: uppercase; padding: 0 10px 10px; font-weight: bold; }

        .pin-list { background: rgba(0,0,0,0.4); border-radius: 18px; max-height: 280px; overflow-y: auto; border: 1px solid #1a1a1a; }
        .pin-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px 20px; border-bottom: 1px solid #1a1a1a; transition: 0.3s;
        }
        .pin-item:hover { background: rgba(255,255,255,0.02); }
        .pin-code { font-weight: 900; color: #fff; letter-spacing: 2px; font-size: 17px; }
        
        .expiry-info { font-size: 10px; color: #00ff88; background: rgba(0, 255, 136, 0.1); padding: 3px 8px; border-radius: 5px; }

        .rev-btn { color: #555; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.2s; }
        .rev-btn:hover { color: var(--danger); }

        .nuke-box { margin-top: 35px; border-top: 1px solid #222; padding-top: 25px; }
        .btn-nuke { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-nuke:hover { background: var(--danger); color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h2>ANMON</h2>
        <div class="status-header">SYSTEM CONTROL ACTIVE</div>

        <div class="stat-grid">
            <div class="stat-card"><span id="count-active" class="stat-val">0</span><span class="stat-label">Pines Activos</span></div>
            <div class="stat-card"><span class="stat-val">45d</span><span class="stat-label">Vida Útil</span></div>
        </div>

        <button class="btn-secondary" onclick="generatePin()">Generar Llave Alfanumérica</button>
        <div class="input-group">
            <input type="text" id="pin-input" placeholder="------" maxlength="6" readonly>
        </div>
        <button onclick="createPin()">Autorizar y Activar PIN</button>

        <div class="pin-list-container">
            <div class="label-row"><span>Llave Activa</span><span>Estado / Exp</span></div>
            <div id="pin-display" class="pin-list"></div>
        </div>

        <div class="nuke-box">
            <button class="btn-nuke" onclick="masterClear()">Protocolo Nuke (Borrado Global)</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
            authDomain: "anmon-c2f58.firebaseapp.com",
            databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
            projectId: "anmon-c2f58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Generador Alfanumérico Profesional (6 caracteres)
        window.generatePin = () => {
            const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ'; // Sin 0, 1, I, O para evitar confusión
            let res = ''; 
            for (let i = 0; i < 6; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('pin-input').value = res;
        };

        window.createPin = () => {
            const pin = document.getElementById('pin-input').value.toUpperCase();
            if(pin.length < 6) return alert("Genere un PIN válido");
            
            const expDate = Date.now() + (45 * 24 * 60 * 60 * 1000);
            
            set(ref(db, 'valid_pins/' + pin), { 
                st: "A", 
                ts: Date.now(),
                ex: expDate
            }).then(() => {
                document.getElementById('pin-input').value = "";
            });
        };

        onValue(ref(db, 'valid_pins'), (snap) => {
            const list = document.getElementById('pin-display'); 
            const countEl = document.getElementById('count-active');
            list.innerHTML = "";
            
            if(!snap.exists()) {
                countEl.innerText = "0";
                list.innerHTML = "<div style='padding:40px; color:#333; text-align:center; font-size:12px;'>STANDBY - SIN CONEXIONES</div>";
                return;
            }

            let count = 0;
            snap.forEach(child => {
                count++;
                const div = document.createElement('div'); div.className = "pin-item";
                div.innerHTML = `
                    <span class="pin-code">${child.key}</span>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span class="expiry-info">45D OK</span>
                        <span class="rev-btn" onclick="deletePin('${child.key}')">✕</span>
                    </div>`;
                list.appendChild(div);
            });
            countEl.innerText = count;
        });

        window.deletePin = (p) => confirm("¿REVOCAR ACCESO?") && remove(ref(db, 'valid_pins/' + p));
        
        window.masterClear = async () => {
            if(confirm("ATENCIÓN: Se eliminarán todos los mensajes de todas las salas. ¿Proceder?")) {
                await remove(ref(db, 'rooms'));
                alert("HISTORIALES ELIMINADOS");
            }
        };
    </script>
</body>
</html>
