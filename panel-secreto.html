<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANMON | OS Core</title>
    <style>
        :root { --accent: #00f3ff; --bg: #000; --card: #121212; --text: #eee; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle at top, #1c1c1c 0%, #000 100%);
            color: var(--text); margin: 0; padding: 20px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header { margin-top: 50px; text-align: center; margin-bottom: 30px; }
        .header h1 { font-weight: 200; letter-spacing: 12px; font-size: 28px; margin: 0; text-transform: uppercase; }
        .header span { color: var(--accent); font-size: 10px; letter-spacing: 4px; text-transform: uppercase; font-weight: 800; }

        .glass-card { 
            background: var(--card);
            width: 100%; max-width: 400px;
            padding: 40px 30px; border-radius: 40px;
            border: 1px solid #222;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            text-align: center;
        }

        #pin-display { 
            font-size: 58px; font-weight: 200; letter-spacing: 10px; 
            color: #fff; margin-bottom: 40px; font-variant-numeric: tabular-nums;
        }

        .btn { 
            width: 100%; padding: 22px; border-radius: 24px; border: none; 
            font-weight: 800; font-size: 13px; text-transform: uppercase; 
            letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .btn-gen { background: #fff; color: #000; margin-bottom: 15px; }
        .btn-inj { background: var(--accent); color: #000; display: none; box-shadow: 0 10px 30px rgba(0,243,255,0.3); }

        .section-title { 
            width: 100%; max-width: 400px; text-align: left; padding-left: 20px;
            font-size: 11px; color: #888; letter-spacing: 4px; /* GRIS CLARO VISIBLE */
            text-transform: uppercase; margin-top: 50px; margin-bottom: 20px;
        }

        .access-list { width: 100%; max-width: 400px; }
        .access-item { 
            background: rgba(255,255,255,0.03); padding: 25px; border-radius: 30px; 
            border: 1px solid #222; margin-bottom: 15px; display: flex; 
            justify-content: space-between; align-items: center;
        }
        .pin-code { font-size: 22px; font-weight: 300; letter-spacing: 4px; color: #fff; }
        .info { font-size: 10px; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        
        .btn-del { 
            background: #222; color: #ff4444; width: 42px; height: 42px; 
            border-radius: 15px; border: none; font-size: 18px; cursor: pointer;
        }

        .footer { margin-top: auto; padding: 40px 0; }
        .btn-purge { background: transparent; color: #555; border: none; font-size: 10px; letter-spacing: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>ANMON</h1>
    <span>Control Center</span>
</div>

<div class="glass-card">
    <div id="pin-display">000000</div>
    <button class="btn btn-gen" onclick="generatePin()">Nuevo Acceso</button>
    <button class="btn btn-inj" id="btn-act" onclick="activatePin()">Inyectar Llave</button>
</div>

<div class="section-title">Terminales Verificados</div>
<div class="access-list" id="pin-list"></div>

<div class="footer">
    <button class="btn-purge" onclick="purgeExpired()">— Depuración de Ciclo —</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('pin-display').style.color = "var(--accent)";
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000)
        });
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "000000";
        document.getElementById('pin-display').style.color = "#fff";
    };

    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(key => {
                const days = Math.floor((data[key].expires - Date.now()) / (1000 * 60 * 60 * 24));
                const status = days < 0 ? "EXPIRADO" : `${days} DÍAS RESTANTES`;
                const div = document.createElement('div');
                div.className = "access-item";
                div.innerHTML = `<div><div class="pin-code">${key}</div><div class="info">${status}</div></div><button class="btn-del" onclick="deletePin('${key}')">✕</button>`;
                listDiv.appendChild(div);
            });
        }
    });

    window.deletePin = (key) => { if(confirm("¿Eliminar?")) remove(ref(db, 'valid_pins/' + key)); };
    window.purgeExpired = async () => {
        const snap = await get(ref(db, 'valid_pins'));
        const data = snap.val();
        if(data) {
            for(let key in data) if(data[key].expires < Date.now()) await remove(ref(db, 'valid_pins/' + key));
            alert("SISTEMA DEPURADO");
        }
    };
</script>
</body>
</html>
