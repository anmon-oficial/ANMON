<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANMON | CONTROL</title>
    <style>
        :root { --accent: #00f3ff; --bg: #000; --card: #1c1c1e; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header { text-align: center; margin: 40px 0; }
        .header h1 { font-size: 40px; letter-spacing: 10px; margin: 0; }
        .visor { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 340px; text-align: center; font-size: 32px; color: var(--accent); letter-spacing: 5px; margin-bottom: 20px; border: 1px solid #2c2c2e; }
        .btn { width: 100%; max-width: 340px; padding: 20px; border-radius: 20px; border: none; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; }
        .btn-gen { background: #fff; color: #000; }
        .btn-inj { background: var(--accent); color: #000; display: none; }
        .list-container { width: 100%; max-width: 340px; margin-top: 30px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2c2c2e; }
        .btn-del { background: #2c2c2e; color: #ff453a; border: none; width: 40px; height: 40px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><h1>ANMON</h1></div>
    <div class="visor" id="display">------</div>
    <button class="btn btn-gen" onclick="generate()">Generar Acceso</button>
    <button class="btn btn-inj" id="btn-act" onclick="activate()">Inyectar en Sistema</button>

    <div class="list-container" id="list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
            authDomain: "anmon-c2f58.firebaseapp.com",
            databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
            projectId: "anmon-c2f58"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let temp = "";

        window.generate = () => {
            temp = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('display').innerText = temp;
            document.getElementById('btn-act').style.display = 'block';
        };

        window.activate = async () => {
            await set(ref(db, 'valid_pins/' + temp), { expires: Date.now() + (45 * 24 * 60 * 60 * 1000) });
            document.getElementById('btn-act').style.display = 'none';
            document.getElementById('display').innerText = "------";
        };

        onValue(ref(db, 'valid_pins'), (snap) => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            const data = snap.val();
            for(let key in data) {
                const div = document.createElement('div');
                div.className = "card";
                div.innerHTML = `<div><b>${key}</b></div><button class="btn-del" onclick="del('${key}')">✕</button>`;
                list.appendChild(div);
            }
        });
        window.del = (key) => remove(ref(db, 'valid_pins/' + key));
    </script>
</body>
</html>
