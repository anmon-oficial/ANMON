<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANMON | Core OS</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
            --panel-bg: rgba(25, 25, 25, 0.9);
            --accent-blue: #0088ff; /* Azul vibrante */
            --accent-cyan: #00f3ff;
            --text-primary: #ffffff;
            --text-secondary: #cccccc; /* Gris claro, legible */
            --text-muted: #888888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-gradient);
            color: var(--text-primary);
            margin: 0; padding: 20px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header { margin-top: 50px; text-align: center; margin-bottom: 25px; }
        .header h1 { font-weight: 200; letter-spacing: 15px; font-size: 30px; margin: 0; text-transform: uppercase; }
        .header span { color: var(--accent-cyan); font-size: 11px; letter-spacing: 5px; text-transform: uppercase; font-weight: 800; }

        /* TARJETA CENTRAL - Efecto Cristal con borde Cian */
        .glass-card { 
            background: var(--panel-bg);
            width: 100%; max-width: 400px;
            padding: 40px 30px;
            border-radius: 40px;
            border: 1px solid rgba(0, 243, 255, 0.15);
            backdrop-filter: blur(20px);
            margin-top: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        #pin-display { 
            font-size: 65px; font-weight: 200; letter-spacing: 10px; 
            color: var(--text-primary); text-align: center; margin-bottom: 35px;
            font-variant-numeric: tabular-nums;
        }

        /* BOTONES - Más grandes y legibles */
        .btn { 
            width: 100%; padding: 22px; border-radius: 25px; border: none; 
            font-weight: 700; font-size: 14px; text-transform: uppercase; 
            letter-spacing: 2.5px; cursor: pointer; transition: 0.3s;
        }
        .btn-gen { background: #ffffff; color: #000000; margin-bottom: 15px; }
        .btn-inj { 
            background: var(--accent-blue); color: #ffffff; display: none; 
            box-shadow: 0 10px 25px rgba(0, 136, 255, 0.3); 
        }

        /* LISTADO DE ACCESOS - GRIS CLARO Y AZUL */
        .list-container {
            width: 100%; max-width: 400px;
            margin-top: 45px;
            display: flex; flex-direction: column; align-items: center;
        }

        .list-title { 
            font-size: 13px; color: var(--text-secondary); /* ¡VISIBLE! */
            letter-spacing: 3.5px; text-transform: uppercase; 
            margin-bottom: 20px; font-weight: 800;
            width: 100%; text-align: left; padding-left: 15px;
        }
        
        .access-item { 
            background: rgba(255,255,255,0.04); 
            width: 100%; padding: 25px; border-radius: 28px; 
            margin-bottom: 15px; display: flex; 
            justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .pin-code { font-size: 22px; font-weight: 300; letter-spacing: 3px; color: #fff; }
        .status { font-size: 11px; color: var(--accent-cyan); font-weight: 700; margin-top: 4px; }
        
        /* BOTÓN BORRAR - Mejor tamaño */
        .btn-del { 
            background: rgba(255,255,255,0.08); color: #ff4444; 
            width: 40px; height: 40px; border-radius: 12px; border: none; font-size: 16px;
        }

        /* PIE DE PÁGINA - GRIS CLARO VISIBLE */
        .footer { margin-top: auto; padding: 40px 0; text-align: center; }
        .btn-purge { background: transparent; color: var(--text-muted); /* ¡VISIBLE! */ font-size: 11px; text-transform: uppercase; letter-spacing: 3px; border: none; cursor: pointer; }
        .btn-purge:hover { color: #ff4444; }
    </style>
</head>
<body>

<div class="header">
    <h1>ANMON</h1>
    <span>Control Center</span>
</div>

<div class="glass-card">
    <div id="pin-display">000000</div>
    <button class="btn btn-gen" onclick="generatePin()">Generar Nuevo Acceso</button>
    <button class="btn btn-inj" id="btn-act" onclick="activatePin()">Inyectar en Sistema</button>
</div>

<div class="list-container">
    <div class="list-title">Terminales Verificados</div>
    <div style="width: 100%;" id="pin-list"></div>
</div>

<div class="footer">
    <button class="btn-purge" onclick="purgeExpired()">— Limpiar Expirados —</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('pin-display').style.color = "var(--accent-cyan)";
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000) // 45 Días
        });
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "000000";
        document.getElementById('pin-display').style.color = "var(--text-primary)";
    };

    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            for (let key in data) {
                let days = Math.floor((data[key].expires - Date.now()) / (1000 * 60 * 60 * 24));
                const statusStr = days < 0 ? "EXPIRADO" : `${days} DÍAS RESTANTES`;
                const div = document.createElement('div');
                div.className = "access-item";
                div.innerHTML = `
                    <div>
                        <div class="pin-code">${key}</div>
                        <div class="status">${statusStr}</div>
                    </div>
                    <button class="btn-del" onclick="deletePin('${key}')">✕</button>
                `;
                listDiv.appendChild(div);
            }
        }
    });

    window.deletePin = (key) => { if(confirm(`¿Eliminar acceso ${key}?`)) remove(ref(db, 'valid_pins/' + key)); };
    window.purgeExpired = async () => {
        const snap = await get(ref(db, 'valid_pins'));
        const data = snap.val();
        if(data) {
            let contador = 0;
            for(let key in data) if(data[key].expires && data[key].expires < Date.now()) { await remove(ref(db, 'valid_pins/' + key)); contador++; }
            alert(`SISTEMA DEPURADO: ${contador} accesos expirados eliminados.`);
        } else { alert("No hay accesos para depurar."); }
    };
</script>
</body>
</html>
