<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANMON - Control Center</title>
    <style>
        :root { --accent: #00f3ff; --bg: #000; --card: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }

        .container { width: 100%; max-width: 400px; margin-top: 20px; }
        h1 { font-weight: 200; letter-spacing: 12px; text-align: center; color: #fff; margin-bottom: 40px; font-size: 22px; opacity: 0.8; }

        /* DISPLAY PRINCIPAL */
        .pin-box { background: var(--card); padding: 50px 20px; border-radius: 30px; border: 1px solid #222; text-align: center; margin-bottom: 25px; }
        #pin-display { font-size: 45px; font-weight: 300; letter-spacing: 8px; color: var(--accent); }

        /* BOTONES */
        button { width: 100%; padding: 22px; border-radius: 20px; border: none; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; margin-bottom: 12px; }
        .btn-main { background: #fff; color: #000; }
        .btn-act { background: var(--accent); color: #000; display: none; margin-top: -5px; margin-bottom: 25px; }
        .btn-purge { background: transparent; color: #ff3b30; border: 1px solid #300; margin-top: 40px; font-size: 11px; opacity: 0.6; }

        /* LISTA DE LLAVES */
        .list-container { margin-top: 20px; }
        .item { background: #0a0a0a; padding: 22px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a1a1a; }
        .pin-text { font-weight: 600; font-size: 17px; letter-spacing: 1px; }
        .days-text { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; display: block; margin-top: 4px; }
        .btn-del { width: 35px; height: 35px; background: #1a1a1a; color: #444; border-radius: 10px; padding: 0; margin: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ANMON</h1>
    
    <div class="pin-box">
        <div id="pin-display">000000</div>
    </div>

    <button class="btn-main" onclick="generatePin()">Generar Acceso</button>
    <button class="btn-act" id="btn-act" onclick="activatePin()">Inyectar en Sistema</button>

    <div class="list-container" id="pin-list"></div>

    <button class="btn-purge" onclick="purgeExpired()">Depurar Vencidos</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000)
        });
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "------";
    };

    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        const now = Date.now();

        if (data) {
            for (let key in data) {
                let infoText = "Activo";
                if (data[key].expires) {
                    const days = Math.floor((data[key].expires - now) / (1000 * 60 * 60 * 24));
                    infoText = days < 0 ? "Vencido" : `Expira en ${days} días`;
                }

                const div = document.createElement('div');
                div.className = "item";
                div.innerHTML = `
                    <div>
                        <div class="pin-text">${key}</div>
                        <span class="days-text">${infoText}</span>
                    </div>
                    <div class="btn-del" onclick="deletePin('${key}')">✕</div>
                `;
                listDiv.appendChild(div);
            }
        }
    });

    window.deletePin = (key) => { if(confirm("¿Eliminar?")) remove(ref(db, 'valid_pins/' + key)); };

    window.purgeExpired = async () => {
        const snapshot = await get(ref(db, 'valid_pins'));
        const data = snapshot.val();
        if (data) {
            for (let key in data) {
                if (data[key].expires && data[key].expires < Date.now()) await remove(ref(db, 'valid_pins/' + key));
            }
        }
    };
</script>
</body>
</html>
