<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANMON | PANEL DE GESTIÓN</title>
    <style>
        :root {
            --bg: #F5F5F7;
            --card: #FFFFFF;
            --accent: #007AFF;
            --text-main: #1D1D1F;
            --text-sec: #86868B;
            --success: #34C759;
            --danger: #FF3B30;
        }
        body { 
            background: var(--bg); color: var(--text-main); margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
        }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .status-pill { background: var(--success); color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }

        /* GENERADOR */
        .card-gen { 
            background: var(--card); padding: 30px; border-radius: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; margin-bottom: 30px;
        }
        .pin-display { 
            font-size: 48px; font-weight: 800; color: var(--accent); 
            letter-spacing: 8px; margin: 20px 0; font-family: monospace; 
        }
        .btn-main {
            background: var(--accent); color: white; border: none; padding: 16px 32px; 
            border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-main:active { transform: scale(0.98); background: #0062cc; }

        /* TABLA DE CONTROL */
        .card-list { background: var(--card); border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #fafafa; text-align: left; padding: 15px; font-size: 12px; color: var(--text-sec); text-transform: uppercase; border-bottom: 1px solid #f0f0f0; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .days-left { font-weight: 700; color: var(--accent); }
        .btn-del { background: none; border: none; color: var(--danger); font-size: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ANMON | Gestión de Accesos</h1>
        <div class="status-pill">SISTEMA ONLINE</div>
    </div>

    <div class="card-gen">
        <p style="color: var(--text-sec); margin: 0;">Presiona para generar un nuevo código de 45 días</p>
        <div id="new-pin" class="pin-display">------</div>
        <button class="btn-main" onclick="generateAccess()">GENERAR NUEVO PIN</button>
    </div>

    <div class="card-list">
        <table>
            <thead>
                <tr>
                    <th>PIN</th>
                    <th>VALIDEZ</th>
                    <th>DÍAS RESTANTES</th>
                    <th>ACCIÓN</th>
                </tr>
            </thead>
            <tbody id="pin-table">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0", 
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // FUNCIÓN: GENERAR PIN ALFANUMÉRICO DE 6 DÍGITOS
    window.generateAccess = () => {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // Sin 0, 1, O, I para evitar errores
        let pin = "";
        for (let i = 0; i < 6; i++) {
            pin += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        
        document.getElementById('new-pin').innerText = pin;

        // CALCULAR 45 DÍAS
        const now = Date.now();
        const expires = now + (45 * 24 * 60 * 60 * 1000);

        // GUARDAR EN FIREBASE
        set(ref(db, 'valid_pins/' + pin), {
            created: now,
            expires: expires,
            status: "active"
        });
    };

    // ESCUCHAR Y LISTAR PINS
    onValue(ref(db, 'valid_pins'), (snap) => {
        const table = document.getElementById('pin-table');
        table.innerHTML = "";
        const data = snap.val();
        
        for (let pin in data) {
            const info = data[pin];
            const now = Date.now();
            const diff = info.expires - now;
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

            if (days <= 0) {
                // Si expiró, podrías borrarlo automáticamente o marcarlo
                remove(ref(db, 'valid_pins/' + pin));
                continue;
            }

            const row = `
                <tr>
                    <td style="font-family: monospace; font-weight: bold;">${pin}</td>
                    <td style="color: var(--text-sec);">${new Date(info.expires).toLocaleDateString()}</td>
                    <td class="days-left">${days} DÍAS</td>
                    <td><button class="btn-del" onclick="deletePin('${pin}')">REVOCAR</button></td>
                </tr>
            `;
            table.innerHTML += row;
        }
    });

    window.deletePin = (pin) => {
        if(confirm("¿REVOCAR ACCESO PARA " + pin + "?")) {
            remove(ref(db, 'valid_pins/' + pin));
        }
    };
</script>

</body>
</html>
