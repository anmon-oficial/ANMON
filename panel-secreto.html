<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON | OS Core</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141416;
            --accent: #007aff;
            --accent-dim: #004595;
            --text-main: #ffffff;
            --text-dim: #6e6e73;
            --danger: #ff453a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 20px; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header { margin-top: 60px; text-align: center; margin-bottom: 40px; }
        .header h1 { font-weight: 800; letter-spacing: 12px; font-size: 32px; margin: 0; }
        .header p { color: var(--accent); font-size: 11px; letter-spacing: 6px; text-transform: uppercase; font-weight: 900; margin-top: 10px; opacity: 0.8; }

        /* TARJETA DE MANDO */
        .glass-card { 
            background: var(--card);
            width: 100%; max-width: 400px;
            padding: 45px 30px;
            border-radius: 35px;
            border: 1px solid #252525;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            text-align: center;
        }

        #pin-display { 
            font-size: 70px; font-weight: 200; letter-spacing: 8px; 
            color: #fff; margin-bottom: 40px; font-variant-numeric: tabular-nums;
        }

        .btn { 
            width: 100%; padding: 22px; border-radius: 18px; border: none; 
            font-weight: 800; font-size: 15px; text-transform: uppercase; 
            letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .btn-gen { background: #ffffff; color: #000; margin-bottom: 15px; }
        .btn-inj { background: var(--accent); color: #fff; display: none; box-shadow: 0 10px 20px rgba(0,122,255,0.3); }

        /* LISTADO DE TERMINALES */
        .list-header { 
            width: 100%; max-width: 400px;
            font-size: 13px; color: var(--text-dim); 
            letter-spacing: 3px; text-transform: uppercase; 
            margin: 55px 0 20px; font-weight: 800;
            padding-left: 10px; border-left: 3px solid var(--accent);
        }
        
        .access-item { 
            background: #111112; 
            width: 100%; max-width: 400px;
            padding: 25px; border-radius: 24px; 
            margin-bottom: 15px; display: flex; 
            justify-content: space-between; align-items: center;
            border: 1px solid #1f1f1f;
        }

        .pin-code { font-size: 24px; font-weight: 600; letter-spacing: 2px; color: #fff; }
        .status { font-size: 11px; color: var(--accent); font-weight: 900; margin-top: 5px; text-transform: uppercase; }
        
        .btn-del { 
            background: #1c1c1e; color: var(--danger); 
            width: 45px; height: 45px; border-radius: 14px; border: 1px solid #2c2c2e; font-size: 18px;
        }

        .footer { margin-top: auto; padding: 40px 0; }
        .btn-purge { 
            background: transparent; color: #444; font-size: 11px; 
            letter-spacing: 3px; border: none; cursor: pointer;
            text-transform: uppercase; font-weight: 700;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>ANMON</h1>
    <p>OS CORE ADMIN</p>
</div>

<div class="glass-card">
    <div id="pin-display">000000</div>
    <button class="btn btn-gen" onclick="generatePin()">Nuevo Acceso</button>
    <button class="btn btn-inj" id="btn-act" onclick="activatePin()">Inyectar en Red</button>
</div>

<div class="list-header">Terminales Verificados</div>
<div style="width: 100%; max-width: 400px;" id="pin-list"></div>

<div class="footer">
    <button class="btn-purge" onclick="purgeExpired()">— Depurar Ciclo —</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('pin-display').style.color = "var(--accent)";
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000)
        });
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "000000";
        document.getElementById('pin-display').style.color = "#fff";
    };

    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            for (let key in data) {
                const days = Math.floor((data[key].expires - Date.now()) / (1000 * 60 * 60 * 24));
                const statusStr = days < 0 ? "EXPIRADO" : `${days} DÍAS RESTANTES`;
                const div = document.createElement('div');
                div.className = "access-item";
                div.innerHTML = `<div><div class="pin-code">${key}</div><div class="status">${statusStr}</div></div><button class="btn-del" onclick="deletePin('${key}')">✕</button>`;
                listDiv.appendChild(div);
            }
        }
    });

    window.deletePin = (key) => { if(confirm(`¿Eliminar acceso ${key}?`)) remove(ref(db, 'valid_pins/' + key)); };
    window.purgeExpired = async () => {
        const snap = await get(ref(db, 'valid_pins'));
        const data = snap.val();
        if(data) {
            for(let key in data) if(data[key].expires < Date.now()) await remove(ref(db, 'valid_pins/' + key));
            alert("DEPURACIÓN COMPLETADA");
        }
    };
</script>
</body>
</html>
