<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANMON | OS Core</title>
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --card-gray: #1a1a1c;
            --accent-blue: #0076ff; /* Azul Profundo Profesional */
            --accent-glow: #52a4ff;
            --text-white: #ffffff;
            --text-gray: #b0b0b0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-dark);
            color: var(--text-white);
            margin: 0; padding: 25px; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header { margin-top: 60px; text-align: center; margin-bottom: 30px; }
        .header h1 { font-weight: 800; letter-spacing: 12px; font-size: 34px; margin: 0; }
        .header p { color: var(--accent-blue); font-size: 13px; letter-spacing: 6px; text-transform: uppercase; font-weight: 900; margin-top: 10px; }

        /* TARJETA PRINCIPAL */
        .glass-card { 
            background: var(--card-gray);
            width: 100%; max-width: 420px;
            padding: 50px 30px;
            border-radius: 40px;
            border: 1px solid #2a2a2c;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            text-align: center;
        }

        #pin-display { 
            font-size: 75px; font-weight: 200; letter-spacing: 10px; 
            color: #fff; margin-bottom: 45px;
        }

        .btn { 
            width: 100%; padding: 25px; border-radius: 22px; border: none; 
            font-weight: 800; font-size: 16px; text-transform: uppercase; 
            letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .btn-gen { background: #fff; color: #000; margin-bottom: 18px; }
        .btn-inj { background: var(--accent-blue); color: #fff; display: none; box-shadow: 0 15px 30px rgba(0,118,255,0.3); }

        /* LISTADO - VISIBILIDAD TOTAL */
        .list-header { 
            width: 100%; max-width: 420px;
            font-size: 15px; color: var(--text-gray); 
            letter-spacing: 4px; text-transform: uppercase; 
            margin: 60px 0 25px; font-weight: 800;
            padding-left: 15px; border-left: 4px solid var(--accent-blue);
        }
        
        .access-item { 
            background: #121214; 
            width: 100%; max-width: 420px;
            padding: 30px; border-radius: 30px; 
            margin-bottom: 20px; display: flex; 
            justify-content: space-between; align-items: center;
            border: 1px solid #222;
        }

        .pin-code { font-size: 26px; font-weight: 600; letter-spacing: 3px; color: #fff; }
        .status { font-size: 13px; color: var(--accent-glow); font-weight: 800; margin-top: 6px; }
        
        .btn-del { 
            background: #1c1c1e; color: #ff4444; 
            width: 50px; height: 50px; border-radius: 18px; border: 1px solid #333; font-size: 22px;
        }

        .btn-purge { 
            background: transparent; color: #444; font-size: 13px; 
            letter-spacing: 4px; border: none; cursor: pointer; margin: 50px 0;
            text-transform: uppercase; font-weight: 700;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>ANMON</h1>
    <p>OS CORE ADMIN</p>
</div>

<div class="glass-card">
    <div id="pin-display">000000</div>
    <button class="btn btn-gen" onclick="generatePin()">Nuevo Acceso</button>
    <button class="btn btn-inj" id="btn-act" onclick="activatePin()">Inyectar en Red</button>
</div>

<div class="list-header">Terminales Verificados</div>
<div style="width: 100%; max-width: 420px;" id="pin-list"></div>

<button class="btn-purge" onclick="purgeExpired()">— Limpiar Expirados —</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('pin-display').style.color = "var(--accent-glow)";
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000)
        });
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "000000";
        document.getElementById('pin-display').style.color = "#fff";
    };

    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            for (let key in data) {
                const days = Math.floor((data[key].expires - Date.now()) / (1000 * 60 * 60 * 24));
                const statusStr = days < 0 ? "EXPIRADO" : `${days} DÍAS RESTANTES`;
                const div = document.createElement('div');
                div.className = "access-item";
                div.innerHTML = `<div><div class="pin-code">${key}</div><div class="status">${statusStr}</div></div><button class="btn-del" onclick="deletePin('${key}')">✕</button>`;
                listDiv.appendChild(div);
            }
        }
    });

    window.deletePin = (key) => { if(confirm(`¿Eliminar ${key}?`)) remove(ref(db, 'valid_pins/' + key)); };
    window.purgeExpired = async () => {
        const snap = await get(ref(db, 'valid_pins'));
        const data = snap.val();
        if(data) {
            for(let key in data) if(data[key].expires < Date.now()) await remove(ref(db, 'valid_pins/' + key));
            alert("DEPURACIÓN COMPLETADA");
        }
    };
</script>
</body>
</html>
