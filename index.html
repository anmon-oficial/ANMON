<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON Enterprise</title>
    <style>
        :root { --accent: #00f3ff; --corporate-blue: #0052cc; --bg-chat: #f0f2f5; --danger: #cc0000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        html, body { background: #000; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .logo-box { background: rgba(255, 255, 255, 0.03); padding: 30px 45px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); text-align: center; margin-bottom: 40px; }
        .logo { font-size: 52px; font-weight: 900; letter-spacing: 14px; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .sub-logo { color: var(--accent); font-size: 13px; letter-spacing: 7px; font-weight: 800; text-transform: uppercase; margin-top: 15px; }
        .login-input { background: rgba(255,255,255,0.06); border: 1px solid #333; color: #fff; padding: 18px; margin-bottom: 12px; width: 100%; max-width: 320px; border-radius: 12px; text-align: center; font-size: 17px; outline: none; }
        .neon-blink { background: #fff; color: #000; border: none; padding: 20px; width: 100%; max-width: 320px; border-radius: 12px; font-weight: 900; font-size: 15px; cursor: pointer; margin-top: 15px; text-transform: uppercase; letter-spacing: 2px; }

        /* CHAT INTERFACE */
        #chat-screen { display: none; flex-direction: column; height: 100dvh; width: 100vw; background: var(--bg-chat); }
        #header { padding: env(safe-area-inset-top, 44px) 20px 15px; background: #fff; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 18px; font-weight: 600; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: var(--corporate-blue); color: #fff; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #fff; color: #333; border-bottom-left-radius: 4px; border: 1px solid #e0e0e0; }
        
        .meta { font-size: 11px; margin-top: 5px; display: flex; justify-content: flex-end; align-items: center; gap: 4px; opacity: 0.8; }
        .check { color: #00f3ff; font-weight: bold; }

        /* BOTÓN DE PÁNICO ELEGANTE (Escudo) */
        .panic-btn { color: #888; font-size: 18px; cursor: pointer; transition: color 0.3s; padding: 10px; font-weight: bold; }
        .panic-btn:hover { color: var(--danger); }

        #input-area { background: #fff; border-top: 1px solid #ddd; padding: 15px; display: flex; gap: 10px; align-items: center; }
        #msg-input { flex: 1; background: #f0f2f5; border: 1px solid #ddd; padding: 14px 18px; border-radius: 25px; font-size: 17px; outline: none; }
        #send-btn { width: 50px; height: 50px; background: var(--corporate-blue); color: #fff; border-radius: 50%; border: none; font-size: 20px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo-box">
        <div class="logo"><span>🔒</span>ANMON</div>
        <div class="sub-logo">Bunker Digital</div>
    </div>
    <input type="text" id="user-input" class="login-input" placeholder="Nombre de Usuario">
    <input type="text" id="room-input" class="login-input" placeholder="ID de Bunker">
    <input type="password" id="pin-input" class="login-input" placeholder="PIN de Seguridad">
    <button class="neon-blink" onclick="login()">AUTENTICAR CONEXIÓN</button>
</div>

<div id="chat-screen">
    <div id="header">
        <div id="room-display" style="font-weight: 800; color: #333; letter-spacing: 1px;">SALA</div>
        <div class="panic-btn" onclick="nukeChat()">🛡️</div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Mensaje seguro..." autocomplete="off">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, push, onValue, remove, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentUser, currentRoom;

    window.login = async () => {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim().toUpperCase();

        if(!currentUser || !currentRoom || !pin) return;

        const snapshot = await get(ref(db, 'valid_pins/' + pin));
        if (snapshot.exists()) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('room-display').innerText = currentRoom.toUpperCase();
            startChat();
        } else {
            alert("ACCESO DENEGADO");
        }
    };

    function startChat() {
        const chatRef = ref(db, 'rooms/' + currentRoom);
        
        // Listener para limpiar la pantalla si se borra la base de datos
        onValue(chatRef, (snap) => {
            if (!snap.exists()) document.getElementById('messages').innerHTML = '';
        });

        onChildAdded(chatRef, (data) => {
            if (document.getElementById('msg-' + data.key)) return;
            const msg = data.val();
            const div = document.createElement('div');
            div.id = 'msg-' + data.key;
            const isMe = msg.user === currentUser;
            div.className = 'msg ' + (isMe ? 'me' : 'them');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            div.innerHTML = `
                <div style="font-size:10px; opacity:0.7; margin-bottom:4px;">${msg.user}</div>
                <div>${msg.text}</div>
                <div class="meta">${time} ${isMe ? '<span class="check">✓✓</span>' : ''}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    }

    window.sendMsg = () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        push(ref(db, 'rooms/' + currentRoom), {
            user: currentUser,
            text: input.value.trim(),
            ts: Date.now()
        });
        input.value = '';
    };

    window.nukeChat = async () => {
        if(confirm("¿DEPURAR HISTORIAL?")) {
            await remove(ref(db, 'rooms/' + currentRoom));
        }
    };
</script>
</body>
</html>
