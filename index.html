<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANMON</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --neon: #39FF14; --bg: #0a0a0a; --msg-me: #1a1a1a; --msg-them: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: #eee; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* LOGIN */
        #login-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; }
        .logo { font-size: 45px; font-weight: 900; color: var(--neon); letter-spacing: 12px; margin-bottom: 50px; text-shadow: 0 0 15px rgba(57, 255, 20, 0.4); }
        input { background: #111; border: 1px solid #333; color: white; padding: 18px; margin-bottom: 12px; width: 100%; max-width: 320px; border-radius: 12px; text-align: center; font-size: 18px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 18px; width: 100%; max-width: 320px; font-weight: bold; border-radius: 12px; cursor: pointer; text-transform: uppercase; font-size: 16px; }

        /* CHAT */
        #chat-screen { height: 100vh; display: none; flex-direction: column; }
        #header { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .room-title { color: var(--neon); font-size: 14px; letter-spacing: 2px; font-weight: 800; }
        .nuke-btn { color: #ff4444; font-size: 22px; cursor: pointer; padding: 5px; }

        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #050505; }
        
        .msg { 
            padding: 14px 18px; 
            border-radius: 18px; 
            max-width: 85%; 
            font-size: 18px; /* Letra grande */
            line-height: 1.5; 
            position: relative; 
        }
        
        .msg.me { align-self: flex-end; background: var(--msg-me); border: 1px solid #333; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: var(--msg-them); border: 1px solid var(--neon); border-bottom-left-radius: 4px; }
        
        .msg-info { display: flex; justify-content: flex-end; align-items: center; margin-top: 8px; font-size: 12px; opacity: 0.7; }
        .del-btn { color: #ff4444; font-size: 18px; margin-left: 15px; cursor: pointer; }
        .check { color: var(--neon); font-weight: bold; margin-left: 5px; }

        /* INPUT AREA */
        #input-area { padding: 15px 15px 40px 15px; background: #111; display: flex; gap: 12px; border-top: 1px solid #222; }
        #msg-input { flex-grow: 1; border-radius: 25px; background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px 20px; font-size: 18px; outline: none; }
        #send-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo">ANMON</div>
    <input type="text" id="user-input" placeholder="USUARIO" autocomplete="off">
    <input type="text" id="room-input" placeholder="SALA" autocomplete="off">
    <input type="password" id="pin-input" placeholder="PIN">
    <button onclick="login()">ENTRAR AL BÚNKER</button>
</div>

<div id="chat-screen">
    <div id="header">
        <div class="room-title" id="room-display">SALA: PRIVADA</div>
        <div class="nuke-btn" onclick="nukeChat()">🧨</div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Escribir...">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentUser, currentRoom;

    function login() {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim();

        if(!currentUser || !currentRoom || !pin) return;

        db.ref('valid_pins').once('value', snapshot => {
            let found = false;
            snapshot.forEach(child => {
                if (child.key === pin || child.val() === pin || (child.val() && child.val().pin === pin)) found = true;
            });

            if(found) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('room-display').innerText = "BÚNKER: " + currentRoom.toUpperCase();
                startChat();
            } else {
                alert("PIN INVÁLIDO");
            }
        });
    }

    function startChat() {
        const ref = db.ref('rooms/' + currentRoom);
        ref.on('child_added', snapshot => {
            render(snapshot.key, snapshot.val());
            if(snapshot.val().user !== currentUser && !snapshot.val().read) {
                ref.child(snapshot.key).update({read: true});
            }
        });
        ref.on('child_removed', snapshot => {
            const el = document.getElementById('msg-' + snapshot.key);
            if(el) el.remove();
        });
        ref.on('child_changed', snapshot => {
            const el = document.getElementById('check-' + snapshot.key);
            if(el && snapshot.val().read) el.innerText = '✓✓';
        });
    }

    function render(id, data) {
        if(document.getElementById('msg-' + id)) return;
        const div = document.createElement('div');
        div.id = 'msg-' + id;
        div.className = 'msg ' + (data.user === currentUser ? 'me' : 'them');
        const deleteHtml = data.user === currentUser ? `<span class="del-btn" onclick="deleteMsg('${id}')">🗑️</span>` : '';
        div.innerHTML = `
            <div style="font-size:11px; color:var(--neon); font-weight:bold; margin-bottom:6px; opacity:0.8">${data.user}</div>
            <div>${data.text}</div>
            <div class="msg-info">
                <span class="check" id="check-${id}">${data.read ? '✓✓' : '✓'}</span>
                ${deleteHtml}
            </div>
        `;
        const container = document.getElementById('messages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        db.ref('rooms/' + currentRoom).push({
            user: currentUser,
            text: input.value.trim(),
            timestamp: Date.now(),
            read: false
        });
        input.value = '';
    }

    function deleteMsg(id) {
        db.ref('rooms/' + currentRoom + '/' + id).remove();
    }

    function nukeChat() {
        if(confirm("¿VACIAR EL BÚNKER COMPLETO?")) {
            db.ref('rooms/' + currentRoom).remove();
            document.getElementById('messages').innerHTML = '';
        }
    }
</script>
</body>
</html>
