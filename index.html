<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON Enterprise</title>
    <style>
        :root { --accent: #007aff; --bg-dark: #0a0a0a; --card-bg: #1c1c1e; --text-dim: #8e8e93; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        html, body { background: #000; margin: 0; padding: 0; height: 100dvh; width: 100vw; overflow: hidden; color: #fff; }

        /* PANTALLA DE ACCESO */
        #login-screen { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; 
        }
        .logo-box { text-align: center; margin-bottom: 40px; }
        .logo { font-size: 40px; font-weight: 800; letter-spacing: 12px; color: #fff; margin: 0; }
        .sub-logo { color: var(--accent); font-size: 11px; letter-spacing: 5px; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
        
        .login-input { 
            background: #111; border: 1px solid #333; color: #fff; padding: 18px; 
            margin-bottom: 12px; width: 100%; max-width: 320px; border-radius: 14px; 
            text-align: center; font-size: 16px; outline: none; 
        }
        .btn-access { 
            background: #fff; color: #000; border: none; padding: 20px; 
            width: 100%; max-width: 320px; border-radius: 14px; 
            font-weight: 900; font-size: 14px; cursor: pointer; margin-top: 15px; text-transform: uppercase; 
        }

        /* LINK A PROTON (EL PORTÓN) */
        .proton-link { margin-top: 30px; color: var(--text-dim); font-size: 12px; text-decoration: none; letter-spacing: 1px; font-weight: 600; }

        /* INTERFAZ DE CHAT */
        #chat-screen { display: none; flex-direction: column; height: 100dvh; width: 100vw; background: #000; }
        
        #header { 
            padding: env(safe-area-inset-top, 44px) 20px 15px; 
            background: #111; border-bottom: 1px solid #222; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        #room-display { font-size: 12px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }

        #messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* BURBUJAS GRIS Y AZUL */
        .msg { padding: 14px 18px; border-radius: 20px; max-width: 80%; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #2c2c2e; color: #fff; border-bottom-left-radius: 4px; }
        
        .meta { font-size: 10px; margin-top: 5px; display: flex; justify-content: flex-end; opacity: 0.7; font-weight: 600; }

        /* ÁREA DE ESCRITURA (SIN ESTIRAR) */
        #input-area { 
            background: #111; border-top: 1px solid #222; 
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); 
            display: flex; gap: 10px; align-items: center;
        }
        #msg-input { 
            flex: 1; background: #2c2c2e; border: 1px solid #3d3d3f; 
            padding: 14px 20px; border-radius: 25px; color: #fff; 
            font-size: 16px; outline: none;
        }
        #send-btn { 
            width: 48px; height: 48px; background: var(--accent); color: #fff; 
            border-radius: 50%; border: none; font-size: 18px; font-weight: bold; 
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo-box">
        <div class="logo">ANMON</div>
        <div class="sub-logo">Bunker Digital</div>
    </div>
    <input type="text" id="user-input" class="login-input" placeholder="Operador">
    <input type="text" id="room-input" class="login-input" placeholder="ID Búnker">
    <input type="password" id="pin-input" class="login-input" placeholder="PIN de Acceso">
    <button class="btn-access" onclick="login()">Autenticar</button>
    <a href="https://proton.me" target="_blank" class="proton-link">SOLICITAR ACCESO (PROTON)</a>
</div>

<div id="chat-screen">
    <div id="header">
        <div id="room-display">TERMINAL: --</div>
        <div style="color: #ff3b30; font-size: 10px; font-weight: 800; cursor: pointer;" onclick="nukeChat()">DESTRUIR</div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Escribir mensaje..." autocomplete="off">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, push, onValue, remove, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentUser, currentRoom;

    window.login = async () => {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim().toUpperCase();

        if(!currentUser || !currentRoom || !pin) return;

        const snapshot = await get(ref(db, 'valid_pins/' + pin));
        if (snapshot.exists()) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('room-display').innerText = "TERMINAL: " + currentRoom.toUpperCase();
            startChat();
        } else {
            alert("ERROR DE CREDENCIALES");
        }
    };

    function startChat() {
        const chatRef = ref(db, 'rooms/' + currentRoom);
        onChildAdded(chatRef, (data) => {
            const msg = data.val();
            const isMe = msg.user === currentUser;
            const div = document.createElement('div');
            div.className = 'msg ' + (isMe ? 'me' : 'them');
            div.innerHTML = `
                <div style="font-size:9px; opacity:0.8; margin-bottom:4px; font-weight:800;">${msg.user}</div>
                <div>${msg.text}</div>
                <div class="meta">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} ${isMe ? '✓✓' : ''}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    }

    window.sendMsg = () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        push(ref(db, 'rooms/' + currentRoom), { user: currentUser, text: input.value.trim(), ts: Date.now() });
        input.value = '';
    };

    window.nukeChat = async () => {
        if(confirm("¿CONFIRMA ELIMINACIÓN TOTAL?")) await remove(ref(db, 'rooms/' + currentRoom));
    };
</script>
</body>
</html>
