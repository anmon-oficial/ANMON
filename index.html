<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANMON</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --neon-green: #39FF14; --dark-bg: #0a0a0a; }
        body { background: var(--dark-bg); color: white; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #login-screen, #chat-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #messages { flex-grow: 1; width: 100%; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .msg { background: #1a1a1a; padding: 8px 12px; border-radius: 10px; margin: 5px; max-width: 75%; border-left: 3px solid var(--neon-green); position: relative; animation: fadeIn 0.3s; }
        .msg.me { align-self: flex-end; border-left: none; border-right: 3px solid var(--neon-green); background: #111; }
        .meta { font-size: 0.7em; color: #666; margin-top: 5px; display: flex; justify-content: flex-end; align-items: center; }
        .check { color: var(--neon-green); margin-left: 4px; font-weight: bold; letter-spacing: -1px; }
        input { background: #111; border: 1px solid var(--neon-green); color: white; padding: 12px; margin: 5px; width: 85%; border-radius: 5px; outline: none; font-size: 16px; }
        button { background: var(--neon-green); color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #input-area { width: 100%; padding: 15px; display: flex; background: #000; box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color: var(--neon-green); letter-spacing: 5px; margin-bottom: 20px;">ANMON</h1>
    <input type="text" id="user-input" placeholder="USUARIO">
    <input type="text" id="room-input" placeholder="SALA">
    <input type="password" id="pin-input" placeholder="PIN">
    <button onclick="login()">ACCEDER</button>
</div>

<div id="chat-screen" style="display:none;">
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Mensaje secreto...">
        <button onclick="sendMsg()">></button>
    </div>
</div>

<script>
    // Tu DB sigue siendo la misma
    const firebaseConfig = { databaseURL: "https://anmon-oficial-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser, currentRoom;
    const EXPIRATION_TIME = 24 * 60 * 60 * 1000; // 24 Horas en milisegundos

    function login() {
        currentUser = document.getElementById('user-input').value.trim();
        currentRoom = document.getElementById('room-input').value.trim();
        const pin = document.getElementById('pin-input').value.trim();

        if(!currentUser || !currentRoom || !pin) return;

        db.ref('pins/' + pin).once('value', snapshot => {
            if(snapshot.exists()){
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                cleanOldMessages(); // Limpiar al entrar
                loadMessages();
            } else { alert("ACCESO DENEGADO"); }
        });
    }

    function cleanOldMessages() {
        const now = Date.now();
        db.ref('rooms/' + currentRoom).once('value', snapshot => {
            snapshot.forEach(child => {
                if (now - child.val().timestamp > EXPIRATION_TIME) {
                    child.ref.remove();
                }
            });
        });
    }

    function loadMessages() {
        const roomRef = db.ref('rooms/' + currentRoom);
        roomRef.on('child_added', snapshot => {
            const data = snapshot.val();
            renderMessage(snapshot.key, data);
            if(data.user !== currentUser && !data.read) {
                roomRef.child(snapshot.key).update({ read: true });
            }
        });

        roomRef.on('child_changed', snapshot => {
            const data = snapshot.val();
            const checkSpan = document.getElementById('check-' + snapshot.key);
            if(checkSpan && data.read) checkSpan.innerText = '✓✓';
        });
    }

    function renderMessage(id, data) {
        if(document.getElementById('msg-' + id)) return;
        const msgDiv = document.createElement('div');
        msgDiv.id = 'msg-' + id;
        msgDiv.className = 'msg' + (data.user === currentUser ? ' me' : '');
        
        const time = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const ticks = data.read ? '✓✓' : '✓';
        
        msgDiv.innerHTML = `
            <div style="font-size:0.7em; color:var(--neon-green); opacity:0.7">${data.user}</div>
            <div>${data.text}</div>
            <div class="meta">${time} <span class="check" id="check-${id}">${ticks}</span></div>
        `;
        document.getElementById('messages').appendChild(msgDiv);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text) return;

        db.ref('rooms/' + currentRoom).push({
            user: currentUser,
            text: text,
            timestamp: Date.now(),
            read: false
        });
        input.value = '';
    }
</script>

</body>
</html>
