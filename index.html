<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANMON</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #2ecc71; --bg: #121212; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #eee; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .login-input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 16px; margin-bottom: 10px; width: 100%; max-width: 300px; border-radius: 10px; text-align: center; font-size: 18px; }
        
        /* CHAT ESTRUCTURA */
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        #header { padding: 45px 20px 15px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        /* BURBUJAS */
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 16px; position: relative; }
        .msg.me { align-self: flex-end; background: #2c3e50; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #252525; border: 1px solid #444; border-bottom-left-radius: 2px; }

        /* AREA DE ESCRITURA - ESTO ES LO QUE FALLABA */
        #input-area { 
            padding: 10px 15px 30px; 
            background: #1a1a1a; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #333;
            position: relative; /* Cambiado para que sea siempre clickeable */
            z-index: 10;
        }
        #msg-input { 
            flex: 1; 
            background: #252525; 
            border: 1px solid #555; 
            color: white; 
            padding: 12px; 
            border-radius: 20px; 
            font-size: 16px; 
            -webkit-user-select: text !important; /* Fuerza a que se pueda seleccionar */
        }
        #send-btn { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="font-size: 30px; color: var(--accent); font-weight: 900; margin-bottom: 30px; letter-spacing: 5px;">ANMON</div>
    <input type="text" id="user-input" class="login-input" placeholder="USUARIO">
    <input type="text" id="room-input" class="login-input" placeholder="SALA">
    <input type="password" id="pin-input" class="login-input" placeholder="PIN">
    <button onclick="login()" style="background: var(--accent); padding: 15px; width: 100%; max-width: 300px; border-radius: 10px; font-weight: bold; border: none;">ENTRAR</button>
</div>

<div id="chat-screen">
    <div id="header">
        <div id="room-display" style="color:var(--accent); font-weight: bold; font-size: 14px;">SALA</div>
        <div onclick="nukeChat()" style="font-size: 20px; opacity: 0.5;">🧨</div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Escribir mensaje..." autocomplete="off">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser, currentRoom;

    function login() {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim();
        if(!currentUser || !currentRoom || !pin) return;

        db.ref('valid_pins').once('value', snap => {
            let found = false;
            snap.forEach(c => { if(c.key === pin || (c.val() && (c.val() === pin || c.val().pin === pin))) found = true; });
            if(found) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('room-display').innerText = "BÚNKER: " + currentRoom.toUpperCase();
                startChat();
            } else { alert("ERROR PIN"); }
        });
    }

    function startChat() {
        const ref = db.ref('rooms/' + currentRoom);
        ref.on('child_added', snap => {
            const data = snap.val();
            if(!document.getElementById('msg-' + snap.key)) {
                const div = document.createElement('div');
                div.id = 'msg-' + snap.key;
                div.className = 'msg ' + (data.user === currentUser ? 'me' : 'them');
                div.innerHTML = `<div style="font-size:10px;color:var(--accent);font-weight:bold;">${data.user}</div>
                                 <div>${data.text}</div>`;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
            if(data.user !== currentUser && !data.read) ref.child(snap.key).update({read:true});
        });
    }

    function sendMsg() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        db.ref('rooms/' + currentRoom).push({user:currentUser, text:i.value.trim(), timestamp:Date.now(), read:false});
        i.value = '';
    }
    function nukeChat() { if(confirm("¿VACIAR?")) db.ref('rooms/' + currentRoom).remove(); }
</script>
</body>
</html>
