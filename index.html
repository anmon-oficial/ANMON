<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON | BÚNKER</title>
    <style>
        :root { 
            --bg-login: #121212; 
            --bg-chat: #1c1c1e; /* Gris Búnker, no negro */
            --panel: #252527; 
            --silver: #c0c0c0; 
            --success-glow: #00ff41; 
            --accent: #00f3ff;
            --line-me: #0052cc;
            --line-them: #3a3a3c;
            --panic: #ff3b30;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-login); color: #fff; margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100dvh; width: 100vw; overflow: hidden;
        }

        /* LOGIN SCREEN */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; padding: 20px; }
        .logo-box { text-align: center; margin-bottom: 40px; }
        .shield { font-size: 50px; color: var(--silver); filter: drop-shadow(0 0 10px rgba(192,192,192,0.4)); display: block; margin-bottom: 5px; }
        .logo-text { font-size: 45px; font-weight: 900; letter-spacing: 12px; margin: 0; display: flex; justify-content: center; }
        .logo-text .white { color: #ffffff; }
        .logo-text .gray { color: #636366; }
        .tag { color: var(--accent); font-size: 11px; letter-spacing: 6px; font-weight: 800; text-transform: uppercase; margin-top: 8px; opacity: 0.8; }
        
        input.login-input { 
            background: var(--panel); border: 1px solid #333; color: #fff; 
            padding: 22px; margin-bottom: 12px; width: 100%; border-radius: 20px; 
            text-align: center; font-size: 16px; font-weight: 600; outline: none;
        }
        .btn-access { 
            background: #fff; color: #000; border: none; padding: 22px; 
            width: 100%; border-radius: 18px; font-weight: 900; font-size: 15px; 
            text-transform: uppercase; letter-spacing: 1px; margin-top: 15px;
            animation: green-glow 2s infinite linear; cursor: pointer;
        }
        @keyframes green-glow { 0%, 100% { box-shadow: 0 0 5px var(--success-glow); } 50% { box-shadow: 0 0 20px var(--success-glow); } }
        .footer-mail { margin-top: 40px; font-size: 12px; color: rgba(255,255,255,0.7); letter-spacing: 1px; text-decoration: none; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 4px; }

        /* CHAT SCREEN */
        #chat-screen { display: none; flex-direction: column; height: 100%; width: 100%; background: var(--bg-chat); }
        #header { padding: env(safe-area-inset-top, 20px) 20px 15px; background: #111; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .room-title { font-weight: 800; letter-spacing: 2px; font-size: 11px; color: #a1a1aa; text-transform: uppercase; }

        .panic-box { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .panic-text { color: var(--panic); font-size: 10px; font-weight: 900; letter-spacing: 1px; }
        .panic-light { width: 14px; height: 14px; background: var(--panic); border-radius: 50%; box-shadow: 0 0 10px var(--panic); animation: alarm 1s infinite; }
        @keyframes alarm { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 16px; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: var(--line-me); border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: var(--line-them); border-bottom-left-radius: 4px; }
        
        .u-tag { font-size: 10px; font-weight: 800; color: var(--accent); margin-bottom: 4px; text-transform: uppercase; display: block; }
        
        /* TILDES DE ENVIADO */
        .status-check { font-size: 10px; color: var(--accent); position: absolute; bottom: 6px; right: 10px; font-weight: bold; }

        /* INPUT BAR - DISEÑO PULIDO */
        #input-bar { 
            background: #111; 
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom, 0px)); 
            display: flex; gap: 10px; border-top: 1px solid #333; align-items: center;
        }
        #m-input { 
            flex: 1; background: #2c2c2e; border: 1px solid #444; 
            border-radius: 25px; padding: 12px 18px; color: #fff; font-size: 16px; outline: none; 
        }
        #send-btn { 
            background: var(--accent); color: #000; border: none; 
            width: 40px; height: 40px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo-box">
            <span class="shield">🛡️</span>
            <h1 class="logo-text"><span class="white">AN</span><span class="gray">MON</span></h1>
            <div class="tag">Bunker Digital</div>
        </div>
        <div class="auth-form">
            <input type="text" id="user-input" class="login-input" placeholder="USUARIO">
            <input type="text" id="room-input" class="login-input" placeholder="ID BÚNKER">
            <input type="password" id="pin-input" class="login-input" placeholder="PIN DE SEGURIDAD">
            <button class="btn-access" onclick="login()">Autenticar Conexión</button>
        </div>
        <a href="mailto:nexo@anmon.com" class="footer-mail">OBTENER PIN: NEXO@ANMON.COM</a>
    </div>

    <div id="chat-screen">
        <div id="header">
            <div id="room-display" class="room-title">BÚNKER ACTIVO</div>
            <div class="panic-box" onclick="nuke()">
                <span class="panic-text">PURGAR BÚNKER</span>
                <div class="panic-light"></div>
            </div>
        </div>
        <div id="messages"></div>
        <div id="input-bar">
            <input type="text" id="m-input" placeholder="Escribir...">
            <button id="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0", 
            databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser, currentRoom;

        window.login = async () => {
            const u = document.getElementById('user-input').value.trim();
            const r = document.getElementById('room-input').value.trim();
            const p = document.getElementById('pin-input').value.trim().toUpperCase();

            if(!u || !r || !p) return;

            const snap = await get(ref(db, 'valid_pins/' + p));
            if(snap.exists()) {
                const data = snap.val();
                if(data.expires && data.expires < Date.now()) {
                    alert("PIN CADUCADO");
                } else {
                    currentUser = u;
                    currentRoom = r.toLowerCase();
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('chat-screen').style.display = 'flex';
                    document.getElementById('room-display').innerText = "BÚNKER: " + currentRoom;
                    initChat();
                }
            } else { alert("ACCESO DENEGADO"); }
        };

        function initChat() {
            onChildAdded(ref(db, 'rooms/' + currentRoom), (snap) => {
                const m = snap.val();
                const div = document.createElement('div');
                const isMe = m.user === currentUser;
                div.className = `msg ${isMe ? 'me' : 'them'}`;
                
                // Agregamos tilde de enviado solo en mis mensajes
                const check = isMe ? '<span class="status-check">✓✓</span>' : '';
                
                div.innerHTML = `<span class="u-tag">${m.user}</span><div>${m.text}</div>${check}`;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            });
        }

        window.sendMsg = () => {
            const input = document.getElementById('m-input');
            if(!input.value.trim()) return;
            push(ref(db, 'rooms/' + currentRoom), { user: currentUser, text: input.value.trim(), ts: Date.now() });
            input.value = '';
        };

        window.nuke = () => {
            if(confirm("¿DEPURAR HISTORIAL COMPLETO?")) {
                remove(ref(db, 'rooms/' + currentRoom));
                document.getElementById('messages').innerHTML = '';
            }
        };

        document.getElementById('m-input')?.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMsg();
        });
    </script>
</body>
</html>
