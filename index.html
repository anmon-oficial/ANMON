<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --neon: #39FF14; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: #eee; 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            height: 100vh;
            height: -webkit-fill-available; /* Ajuste para Safari iPhone */
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* HEADER: Bajamos un poco el contenido para que no lo tape la cámara */
        #header { 
            padding: 50px 20px 15px 20px; /* Más padding arriba para iPhone */
            background: #111; 
            border-bottom: 1px solid #222;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .room-title { color: var(--neon); font-size: 14px; font-weight: 800; letter-spacing: 1px; }
        .nuke-btn { font-size: 24px; cursor: pointer; }

        /* CHAT: Ocupa todo el espacio central */
        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            background: var(--bg);
        }
        
        .msg { padding: 14px 18px; border-radius: 18px; max-width: 85%; font-size: 18px; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: #1a1a1a; border: 1px solid #333; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #000; border: 1px solid var(--neon); border-bottom-left-radius: 4px; }
        
        .msg-info { display: flex; justify-content: flex-end; align-items: center; margin-top: 8px; font-size: 12px; opacity: 0.7; }
        .del-btn { color: #ff4444; font-size: 18px; margin-left: 15px; }
        .check { color: var(--neon); font-weight: bold; margin-left: 5px; }

        /* INPUT: Pegado abajo de todo */
        #input-area { 
            padding: 15px 15px 40px 15px; /* Padding extra abajo para el iPhone */
            background: #111; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #222;
        }
        #msg-input { 
            flex: 1; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: white; 
            padding: 15px; 
            border-radius: 25px; 
            font-size: 18px; 
            outline: none; 
        }
        #send-btn { 
            width: 55px; 
            height: 55px; 
            background: var(--neon); 
            border-radius: 50%; 
            border: none; 
            font-weight: bold; 
            font-size: 20px; 
        }

        /* LOGIN */
        #login-screen { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; }
        .logo { font-size: 45px; font-weight: 900; color: var(--neon); letter-spacing: 12px; margin-bottom: 50px; }
        .login-input { background: #111; border: 1px solid #333; color: white; padding: 18px; margin-bottom: 12px; width: 100%; max-width: 320px; border-radius: 12px; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo">ANMON</div>
    <input type="text" id="user-input" class="login-input" placeholder="USUARIO">
    <input type="text" id="room-input" class="login-input" placeholder="SALA">
    <input type="password" id="pin-input" class="login-input" placeholder="PIN">
    <button onclick="login()" style="background:var(--neon); padding:18px; width:100%; max-width:320px; border-radius:12px; font-weight:bold; border:none;">ENTRAR</button>
</div>

<div id="chat-screen" style="display:none; height:100vh; flex-direction:column;">
    <div id="header">
        <div class="room-title" id="room-display">SALA</div>
        <div class="nuke-btn" onclick="nukeChat()">🧨</div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Mensaje...">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser, currentRoom;

    function login() {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim();
        if(!currentUser || !currentRoom || !pin) return;

        db.ref('valid_pins').once('value', snapshot => {
            let found = false;
            snapshot.forEach(child => {
                if (child.key === pin || child.val() === pin || (child.val() && child.val().pin === pin)) found = true;
            });
            if(found) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('room-display').innerText = "BÚNKER: " + currentRoom.toUpperCase();
                startChat();
            } else { alert("PIN INVÁLIDO"); }
        });
    }

    function startChat() {
        const ref = db.ref('rooms/' + currentRoom);
        ref.on('child_added', snap => {
            render(snap.key, snap.val());
            if(snap.val().user !== currentUser && !snap.val().read) ref.child(snap.key).update({read:true});
        });
        ref.on('child_removed', snap => {
            const el = document.getElementById('msg-' + snap.key);
            if(el) el.remove();
        });
        ref.on('child_changed', snap => {
            const el = document.getElementById('check-' + snap.key);
            if(el && snap.val().read) el.innerText = '✓✓';
        });
    }

    function render(id, data) {
        if(document.getElementById('msg-' + id)) return;
        const div = document.createElement('div');
        div.id = 'msg-' + id;
        div.className = 'msg ' + (data.user === currentUser ? 'me' : 'them');
        const del = data.user === currentUser ? `<span class="del-btn" onclick="deleteMsg('${id}')">🗑️</span>` : '';
        div.innerHTML = `<div style="font-size:11px;color:var(--neon);margin-bottom:6px">${data.user}</div>
                         <div>${data.text}</div>
                         <div class="msg-info"><span class="check" id="check-${id}">${data.read ? '✓✓' : '✓'}</span>${del}</div>`;
        const m = document.getElementById('messages');
        m.appendChild(div);
        m.scrollTop = m.scrollHeight;
    }

    function sendMsg() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        db.ref('rooms/' + currentRoom).push({user:currentUser, text:i.value.trim(), timestamp:Date.now(), read:false});
        i.value = '';
    }

    function deleteMsg(id) { db.ref('rooms/' + currentRoom + '/' + id).remove(); }
    function nukeChat() { if(confirm("¿VACIAR BÚNKER?")) db.ref('rooms/' + currentRoom).remove(); }
</script>
</body>
</html>
