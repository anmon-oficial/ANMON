<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="tab-title">ANMON | Private Network</title>
    <style>
        :root { --cyan: #00ffff; --bg: #0b141a; --header: #202c33; --incoming: #202c33; --outgoing: #005c4b; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; height: 100vh; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 25px; }
        .logo { font-size: 30px; font-weight: 200; color: var(--cyan); letter-spacing: 8px; margin-bottom: 20px; }
        
        /* Estilos Camuflaje */
        .stealth-options { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-stealth { background: #111; border: 1px solid #333; color: #555; padding: 5px 10px; font-size: 10px; border-radius: 5px; cursor: pointer; }
        .btn-stealth.active { border-color: var(--cyan); color: var(--cyan); }

        input { width: 100%; max-width: 280px; padding: 15px; margin: 8px 0; background: #111; border: 1px solid #222; color: white; border-radius: 12px; outline: none; text-align: center; font-size: 16px; }
        .btn { width: 100%; max-width: 280px; padding: 15px; background: var(--cyan); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #chat-screen { display: none; flex-direction: column; height: 100vh; background: #0b141a; }
        header { background: var(--header); padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 14px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--outgoing); border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: var(--incoming); border-bottom-left-radius: 2px; }
        .input-bar { background: var(--header); padding: 12px; display: flex; gap: 10px; }
        #msg-in { flex: 1; background: #2a3942; border: none; border-radius: 20px; padding: 10px 15px; text-align: left; color: white; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo">ANMON</div>
        
        <p style="font-size: 10px; color: #444; margin-bottom: 5px;">MODO DISCRETO:</p>
        <div class="stealth-options">
            <button class="btn-stealth" onclick="setStealth('futbol')">⚽ SPORT</button>
            <button class="btn-stealth" onclick="setStealth('beauty')">💅 BEAUTY</button>
            <button class="btn-stealth" onclick="setStealth('news')">📰 NEWS</button>
        </div>

        <input type="text" id="user-name" placeholder="Tu Alias" autocomplete="off">
        <input type="text" id="room-id" placeholder="Canal Secreto" autocomplete="off">
        <input type="password" id="pass-code" placeholder="PIN de Acceso" autocomplete="new-password">
        <button class="btn" onclick="checkAccess()">INGRESAR</button>
    </div>

    <div id="chat-screen">
        <header>
            <div style="display:flex; flex-direction:column">
                <span id="display-room" style="color:var(--cyan); font-weight:bold; font-size:12px"></span>
                <button onclick="invite()" style="background:none; border:none; color:#25D366; font-size:10px; text-align:left; padding:0; cursor:pointer">📢 Invitar a este canal</button>
            </div>
            <button onclick="location.reload()" style="background:#dc3545; border:none; color:white; border-radius:5px; padding:6px 12px; font-size:10px; font-weight:bold">BORRAR TODO</button>
        </header>
        <div id="chat-box"></div>
        <div class="input-bar">
            <input type="text" id="msg-in" placeholder="Escribe mensaje..." autocomplete="off">
            <button onclick="send()" style="background:none; border:none; color:var(--cyan); font-size:24px">➤</button>
        </div>
    </div>

        import
