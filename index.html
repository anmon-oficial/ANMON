<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON Enterprise</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #00f3ff; --corporate-blue: #0052cc; --bg-chat: #f0f2f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        html, body { background: #000; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }

        /* LOGIN REDISEÑADO */
        #login-screen { 
            position: fixed; inset: 0; 
            background: linear-gradient(135deg, #0f0f0f 0%, #000000 100%); 
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; 
        }
        
        /* LOGO NOVEDOSO */
        .logo-container { text-align: center; margin-bottom: 45px; }
        .logo-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo { 
            font-size: 52px; font-weight: 900; letter-spacing: 14px; 
            color: #ffffff; /* ANMON EN BLANCO */
            margin: 0; display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .sub-logo { 
            color: var(--accent); font-size: 13px; letter-spacing: 7px; 
            font-weight: 800; text-transform: uppercase; margin-top: 15px; 
        }
        
        .login-input { 
            background: rgba(255,255,255,0.07); border: 1px solid #333; color: #fff; 
            padding: 18px; margin-bottom: 12px; width: 100%; max-width: 320px; 
            border-radius: 12px; text-align: center; font-size: 18px; outline: none; 
        }
        
        .neon-blink { 
            background: var(--accent); color: #000; border: none; 
            padding: 20px; width: 100%; max-width: 320px; border-radius: 12px; 
            font-weight: 900; font-size: 16px; cursor: pointer; 
            margin-top: 10px; box-shadow: 0 4px 20px rgba(0, 243, 255, 0.4);
            text-transform: uppercase;
        }

        /* MAIL DESTACADO */
        .mail-box {
            margin-top: 50px;
            text-align: center;
            padding: 15px;
            border-top: 1px solid #222;
            width: 80%;
        }
        .mail-info { color: #888; font-size: 14px; letter-spacing: 1px; }
        .mail-info b { color: #ffffff; font-size: 16px; display: block; margin-top: 5px; text-decoration: underline; }

        /* CHAT */
        #chat-screen { display: none; flex-direction: column; height: 100dvh; width: 100vw; background: var(--bg-chat); }
        #header { padding: env(safe-area-inset-top, 44px) 20px 15px; background: #fff; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 18px; font-weight: 600; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: var(--corporate-blue); color: #fff; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #fff; color: #333; border-bottom-left-radius: 4px; border: 1px solid #e0e0e0; }

        .meta { font-size: 11px; margin-top: 5px; display: flex; justify-content: flex-end; align-items: center; gap: 4px; opacity: 0.8; }
        .check { color: #00f3ff; font-weight: bold; }

        #input-area { background: #fff; border-top: 1px solid #ddd; padding: 15px; display: flex; gap: 10px; align-items: center; }
        #msg-input { flex: 1; background: #f0f2f5; border: 1px solid #ddd; color: #000; padding: 14px 18px; border-radius: 25px; font-size: 17px; outline: none; }
        #send-btn { width: 50px; height: 50px; background: var(--corporate-blue); color: #fff; border-radius: 50%; border: none; font-size: 20px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo-container">
        <div class="logo-box">
            <div class="logo"><span>🔒</span>ANMON</div>
            <div class="sub-logo">Bunker Digital</div>
        </div>
    </div>
    
    <input type="text" id="user-input" class="login-input" placeholder="Nombre de Usuario">
    <input type="text" id="room-input" class="login-input" placeholder="ID de Bunker">
    <input type="password" id="pin-input" class="login-input" placeholder="PIN de Seguridad">
    
    <button class="neon-blink" onclick="login()">Iniciar Conexión Segura</button>
    
    <div class="mail-box">
        <div class="mail-info">¿No tienes acceso? Solicítalo en:<br><b>nexo.seguro01@proton.me</b></div>
    </div>
</div>

<div id="chat-screen">
    <div id="header">
        <div id="room-display" style="font-weight: 800; color: #333;">SALA</div>
        <div onclick="nukeChat()" style="font-size: 28px; cursor: pointer;">🧨</div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Escriba un mensaje..." autocomplete="off">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser, currentRoom;

    async function login() {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim();
        if(!currentUser || !currentRoom || !pin) return;

        const urlMotor = `https://motor-anmon.nexo-seguro01.workers.dev/acceso?pin=${pin}`;
        try {
            const res = await fetch(urlMotor);
            if(await res.text() !== "ERROR") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('room-display').innerText = "BÚNKER: " + currentRoom;
                startChat();
            } else { alert("PIN INVÁLIDO"); }
        } catch (e) { alert("ERROR DE RED"); }
    }

    function startChat() {
        const ref = db.ref('rooms/' + currentRoom);
        ref.on('value', snap => { if (!snap.exists()) document.getElementById('messages').innerHTML = ''; });
        ref.on('child_added', snap => {
            const data = snap.val();
            if(!document.getElementById('msg-' + snap.key)) {
                const div = document.createElement('div');
                div.id = 'msg-' + snap.key;
                const isMe = data.user === currentUser;
                div.className = 'msg ' + (isMe ? 'me' : 'them');
                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                div.innerHTML = `
                    <div style="font-size:10px; margin-bottom:4px; opacity:0.8;">${data.user}</div>
                    <div>${data.text}</div>
                    <div class="meta">${time} ${isMe ? '<span class="check">✓✓</span>' : ''}</div>`;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
        });
    }

    function sendMsg() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        db.ref('rooms/' + currentRoom).push({ user: currentUser, text: i.value.trim(), ts: Date.now() });
        i.value = '';
    }

    function nukeChat() { if(confirm("¿ELIMINAR EVIDENCIA?")) db.ref('rooms/' + currentRoom).set(null); }
</script>
</body>
</html>
