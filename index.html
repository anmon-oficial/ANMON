<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ANMON | CONTROL</title>
    <style>
        :root { --accent: #00f3ff; --bg: #000; --input-bg: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: #fff; margin: 0; padding: 20px; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { margin-top: 50px; text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 52px; font-weight: 900; letter-spacing: 14px; margin: 0; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .header .sub { color: var(--accent); font-size: 14px; letter-spacing: 7px; font-weight: 800; text-transform: uppercase; margin-top: 15px; }

        .container { width: 100%; max-width: 360px; }

        /* VISOR DE PIN ESTILO INPUT */
        .pin-viewer { 
            background: var(--input-bg); 
            padding: 25px; border-radius: 18px; 
            border: 1px solid #333;
            text-align: center; margin-bottom: 15px;
            font-size: 32px; font-weight: 800; letter-spacing: 8px; color: #fff;
        }

        /* BOTONES BLOQUE SÓLIDO */
        .btn { 
            width: 100%; padding: 22px; border-radius: 18px; border: none; 
            font-weight: 900; font-size: 16px; text-transform: uppercase; 
            letter-spacing: 2px; cursor: pointer; margin-bottom: 12px;
        }
        .btn-main { background: #fff; color: #000; }
        .btn-inj { background: var(--accent); color: #000; display: none; }

        /* LISTADO TIPO BÚNKER */
        .section-label { font-size: 11px; color: #444; letter-spacing: 3px; text-transform: uppercase; margin: 40px 0 20px; font-weight: 900; text-align: center; }
        
        .access-card { 
            background: var(--input-bg); padding: 20px; border-radius: 18px; 
            border: 1px solid #222; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .access-card .code { font-size: 20px; font-weight: 800; letter-spacing: 2px; }
        .access-card .timer { font-size: 10px; color: var(--accent); font-weight: 800; margin-top: 4px; text-transform: uppercase; }
        
        .btn-x { background: #222; color: #555; width: 40px; height: 40px; border-radius: 12px; border: none; font-weight: 900; }

        .footer-action { margin-top: 50px; opacity: 0.3; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1><span>🔒</span>ANMON</h1>
    <div class="sub">Control Center</div>
</div>

<div class="container">
    <div class="pin-viewer" id="pin-display">------</div>
    <button class="btn btn-main" onclick="generatePin()">Generar Nueva Llave</button>
    <button class="btn btn-inj" id="btn-act" onclick="activatePin()">Inyectar en Sistema</button>

    <div class="section-label">Terminales con Acceso</div>
    <div id="pin-list"></div>

    <div style="text-align: center;">
        <div class="footer-action" onclick="purgeExpired()">Depurar Ciclo de Seguridad</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let tempPin = "";

    window.generatePin = () => {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        tempPin = '';
        for (let i = 0; i < 6; i++) tempPin += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pin-display').innerText = tempPin;
        document.getElementById('btn-act').style.display = 'block';
    };

    window.activatePin = async () => {
        const now = Date.now();
        await set(ref(db, 'valid_pins/' + tempPin), {
            created: now,
            expires: now + (45 * 24 * 60 * 60 * 1000)
        });
        document.getElementById('btn-act').style.display = 'none';
        document.getElementById('pin-display').innerText = "------";
    };

    onValue(ref(db, 'valid_pins'), (snapshot) => {
        const listDiv = document.getElementById('pin-list');
        listDiv.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            for (let key in data) {
                let info = "Acceso Activo";
                if (data[key].expires) {
                    const days = Math.floor((data[key].expires - Date.now()) / (1000 * 60 * 60 * 24));
                    info = days < 0 ? "Expirado" : `Vence en ${days} días`;
                }
                const div = document.createElement('div');
                div.className = "access-card";
                div.innerHTML = `
                    <div>
                        <div class="code">${key}</div>
                        <div class="timer">${info}</div>
                    </div>
                    <button class="btn-x" onclick="deletePin('${key}')">X</button>
                `;
                listDiv.appendChild(div);
            }
        }
    });

    window.deletePin = (key) => { if(confirm("¿Eliminar?")) remove(ref(db, 'valid_pins/' + key)); };
    window.purgeExpired = async () => {
        const snap = await get(ref(db, 'valid_pins'));
        const data = snap.val();
        if(data) {
            for(let key in data) if(data[key].expires && data[key].expires < Date.now()) await remove(ref(db, 'valid_pins/' + key));
            alert("SISTEMA DEPURADO");
        }
    };
</script>
</body>
</html>
