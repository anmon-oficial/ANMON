<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON Enterprise</title>
    <style>
        :root { --accent: #00f3ff; --corporate-blue: #0052cc; --bg-chat: #f0f2f5; --danger: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        html, body { background: #000; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }

        /* PANTALLA DE ACCESO */
        #login-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .logo-box { background: rgba(255, 255, 255, 0.03); padding: 35px 50px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); text-align: center; margin-bottom: 40px; }
        .logo { font-size: 52px; font-weight: 900; letter-spacing: 14px; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .sub-logo { color: var(--accent); font-size: 14px; letter-spacing: 7px; font-weight: 800; text-transform: uppercase; margin-top: 15px; }
        
        .login-input { background: rgba(255,255,255,0.06); border: 1px solid #333; color: #fff; padding: 20px; margin-bottom: 12px; width: 100%; max-width: 340px; border-radius: 14px; text-align: center; font-size: 18px; outline: none; }
        .btn-access { background: #fff; color: #000; border: none; padding: 22px; width: 100%; max-width: 340px; border-radius: 14px; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 15px; text-transform: uppercase; letter-spacing: 2px; }

        /* INTERFAZ DE CHAT */
        #chat-screen { display: none; flex-direction: column; height: 100dvh; width: 100vw; background: var(--bg-chat); }
        
        #header { 
            padding: env(safe-area-inset-top, 44px) 20px 15px; 
            background: #fff; 
            border-bottom: 1px solid #ddd; 
            display: flex; 
            justify-content: space-between;
