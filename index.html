<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #2ecc71; --bg: #0d0d0d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Reset para forzar el foco en iPhone */
        html, body { 
            background: var(--bg); margin: 0; padding: 0; 
            height: 100%; width: 100%;
            font-family: -apple-system, system-ui, sans-serif;
            overflow-x: hidden;
        }

        /* LOGIN */
        #login-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; 
        }
        .logo { font-size: 42px; color: var(--accent); font-weight: 900; letter-spacing: 10px; margin-bottom: 5px; }
        .login-input { 
            background: #1a1a1a; border: 1px solid #333; color: white; padding: 16px; 
            margin-bottom: 12px; width: 100%; max-width: 300px; border-radius: 12px; 
            text-align: center; font-size: 18px; outline: none; 
        }
        .login-btn { 
            background: var(--accent); color: black; padding: 18px; width: 100%; 
            max-width: 300px; border-radius: 12px; font-weight: bold; border: none; font-size: 16px;
        }
        .mail-info { position: absolute; bottom: 40px; color: #666; font-size: 13px; text-align: center; }

        /* CONTENEDOR CHAT: Sin fixed para que el teclado no se pierda */
        #chat-screen { 
            display: none; 
            flex-direction: column; 
            height: 100vh; 
            position: relative;
        }

        #header { 
            padding: env(safe-area-inset-top, 44px) 20px 15px;
            background: #161616; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
        }

        #messages { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 10px;
            background: var(--bg);
            /* Importante para el scroll en iPhone */
            -webkit-overflow-scrolling: touch;
        }

        .msg { 
            padding: 12px 16px; border-radius: 18px; max-width: 85%; 
            font-size: 17px; line-height: 1.4; word-wrap: break-word;
        }
        .msg.me { align-self: flex-end; background: #1a1a1a; border: 1px solid #333; color: white; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #000; border: 1px solid var(--accent); border-bottom-left-radius: 4px; }

        /* AREA DE ENTRADA: Simplificada al máximo */
        #input-area { 
            background: #161616; 
            border-top: 1px solid #333;
            padding: 10px 15px calc(env(safe-area-inset-bottom, 15px) + 10px);
            display: flex; 
            gap: 10px; 
            width: 100%;
        }
        
        #msg-input { 
            flex: 1; 
            background: #252525; 
            border: 1px solid #444; 
            color: white; 
            padding: 14px 18px; 
            border-radius: 25px; 
            font-size: 16px; /* 16px evita el zoom automático de iPhone */
            outline: none;
            /* Forzamos visibilidad total para el sistema */
            -webkit-appearance: none;
            opacity: 1;
        }

        #send-btn { 
            width: 50px; height: 50px; background: var(--accent); 
            border-radius: 50%; border: none; font-weight: bold; font-size: 20px;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo">ANMON</div>
    <div style="color:#444; font-size:10px; letter-spacing:3px; margin-bottom:30px;">SECURE ACCESS</div>
    <input type="text" id="user-input" class="login-input" placeholder="USUARIO" autocomplete="off">
    <input type="text" id="room-input" class="login-input" placeholder="SALA" autocomplete="off">
    <input type="password" id="pin-input" class="login-input" placeholder="PIN">
    <button class="login-btn" onclick="login()">ENTRAR</button>
    <div class="mail-info">Solicitá tu PIN de acceso en:<br><b>nexo.seguro01@proton.me</b></div>
</div>

<div id="chat-screen">
    <div id="header">
        <div id="room-display" style="color:var(--accent); font-weight:800; font-size:12px; text-transform:uppercase;">SALA</div>
        <div onclick="nukeChat()" style="font-size: 24px; cursor: pointer;">🧨</div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Escribir mensaje..." autocomplete="off">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser, currentRoom;

    function login() {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim();
        if(!currentUser || !currentRoom || !pin) return;

        db.ref('valid_pins').once('value', snap => {
            let found = false;
            snap.forEach(c => { if(c.key === pin || (c.val() && (c.val() === pin || c.val().pin === pin))) found = true; });
            if(found) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('room-display').innerText = "SALA: " + currentRoom;
                // Pequeño truco para iPhone: forzar foco tras el login
                setTimeout(() => { document.getElementById('msg-input').focus(); }, 500);
                startChat();
            } else { alert("PIN INVÁLIDO"); }
        });
    }

    function startChat() {
        const ref = db.ref('rooms/' + currentRoom);
        ref.on('child_added', snap => {
            const data = snap.val();
            if(!document.getElementById('msg-' + snap.key)) {
                const div = document.createElement('div');
                div.id = 'msg-' + snap.key;
                div.className = 'msg ' + (data.user === currentUser ? 'me' : 'them');
                const delBtn = data.user === currentUser ? `<span onclick="deleteMsg('${snap.key}')" style="color:#ff4444;margin-left:8px;font-size:14px;">🗑️</span>` : '';
                div.innerHTML = `<div style="font-size:10px;color:var(--accent);font-weight:bold;margin-bottom:2px;">${data.user}</div>
                                 <div>${data.text}</div>
                                 <div style="display:flex;justify-content:flex-end;margin-top:4px;font-size:10px;opacity:0.4">
                                    <span>${data.read ? '✓✓' : '✓'}</span>${delBtn}
                                 </div>`;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
            if(data.user !== currentUser && !data.read) ref.child(snap.key).update({read:true});
        });
        ref.on('child_removed', snap => { const el = document.getElementById('msg-' + snap.key); if(el) el.remove(); });
    }

    function sendMsg() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        db.ref('rooms/' + currentRoom).push({user:currentUser, text:i.value.trim(), timestamp:Date.now(), read:false});
        i.value = '';
        i.focus();
    }

    // Soporte para tecla Enter del teclado móvil
    document.getElementById('msg-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { sendMsg(); }
    });

    function deleteMsg(id) { if(confirm("¿Eliminar?")) db.ref('rooms/' + currentRoom + '/' + id).remove(); }
    function nukeChat() { if(confirm("¿Vaciar sala?")) db.ref('rooms/' + currentRoom).remove(); }
</script>
</body>
</html>
