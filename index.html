<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON | BÚNKER</title>
    <style>
        :root { --accent: #00f3ff; --bg: #000; --panel: #1c1c1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: #fff; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; overflow: hidden;
        }
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-size: 50px; font-weight: 900; letter-spacing: 12px; margin: 0; }
        .header .tag { color: var(--accent); font-size: 13px; letter-spacing: 6px; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
        .auth-form { width: 100%; max-width: 340px; padding: 0 20px; }
        input { 
            background: var(--panel); border: 1px solid #2c2c2e; color: #fff; 
            padding: 22px; margin-bottom: 12px; width: 100%; border-radius: 20px; 
            text-align: center; font-size: 16px; font-weight: 600; outline: none;
        }
        input::placeholder { color: #636366; }
        .btn-access { 
            background: #fff; color: #000; border: none; padding: 22px; 
            width: 100%; border-radius: 20px; font-weight: 900; font-size: 15px; 
            text-transform: uppercase; letter-spacing: 2px; margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ANMON</h1>
        <div class="tag">Bunker Digital</div>
    </div>
    <div class="auth-form">
        <input type="text" id="user-input" placeholder="Nombre de Usuario">
        <input type="text" id="room-input" placeholder="ID de Bunker">
        <input type="password" id="pin-input" placeholder="PIN de Seguridad">
        <button class="btn-access" onclick="login()">Autenticar Conexión</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
            authDomain: "anmon-c2f58.firebaseapp.com",
            databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
            projectId: "anmon-c2f58"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.login = async () => {
            const p = document.getElementById('pin-input').value.trim().toUpperCase();
            if(!p) return;
            const snap = await get(ref(db, 'valid_pins/' + p));
            if(snap.exists()) {
                const data = snap.val();
                if(data.expires && data.expires < Date.now()) { alert("PIN EXPIRADO"); }
                else { alert("CONEXIÓN ESTABLECIDA"); /* Aquí redirigís al chat */ }
            } else { alert("ACCESO DENEGADO"); }
        };
    </script>
</body>
</html>
