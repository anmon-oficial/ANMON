<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #00f3ff; --bg: #000000; --header-bg: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Courier New', Courier, monospace; }
        
        html, body { background: var(--bg); margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; color: white; }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .logo { font-size: 42px; color: var(--accent); font-weight: 900; letter-spacing: 10px; text-shadow: 0 0 15px rgba(0, 243, 255, 0.6); }
        .login-input { background: #111; border: 1px solid #333; color: var(--accent); padding: 18px; margin-bottom: 12px; width: 100%; max-width: 300px; border-radius: 8px; text-align: center; font-size: 16px; outline: none; }
        
        .neon-blink { background: #000; color: #00f3ff; border: 2px solid #00f3ff; padding: 18px; width: 100%; max-width: 300px; border-radius: 8px; font-weight: bold; text-shadow: 0 0 10px #00f3ff; box-shadow: 0 0 15px rgba(0, 243, 255, 0.4); cursor: pointer; animation: parpadeo 2s infinite; }

        @keyframes parpadeo { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* CHAT */
        #chat-screen { display: none; flex-direction: column; height: 100dvh; width: 100vw; }
        #header { padding: env(safe-area-inset-top, 44px) 20px 15px; background: var(--header-bg); border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; font-size: 15px; border: 1px solid #222; position: relative; }
        .msg.me { align-self: flex-end; background: #111; color: var(--accent); border-color: var(--accent); }
        .msg.them { align-self: flex-start; background: #1a1a1a; color: #fff; }

        #input-area { background: var(--header-bg); border-top: 1px solid #222; padding: 15px; display: flex; gap: 10px; align-items: center; }
        #msg-input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 14px; border-radius: 8px; outline: none; }
        #send-btn { width: 50px; height: 50px; background: var(--accent); border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo">ANMON</div>
    <div style="color:#444; font-size:10px; letter-spacing:3px; margin-bottom:30px;">ENCRYPTED TERMINAL</div>
    <input type="text" id="user-input" class="login-input" placeholder="USUARIO">
    <input type="text" id="room-input" class="login-input" placeholder="BUNKER ID">
    <input type="password" id="pin-input" class="login-input" placeholder="PIN">
    <button class="neon-blink" onclick="login()">ACCESO ENCRIPTADO</button>
</div>

<div id="chat-screen">
    <div id="header">
        <div id="room-display" style="color:var(--accent); font-size:12px;">SALA: ---</div>
        <div onclick="nukeChat()" style="font-size: 24px; cursor: pointer; filter: drop-shadow(0 0 5px red);">🧨</div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Mensaje..." autocomplete="off">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser, currentRoom;

    async function login() {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim();
        
        if(!currentUser || !currentRoom || !pin) return;

        const urlMotor = "https://motor-anmon.nexo-seguro01.workers.dev/acceso?pin=" + pin;

        try {
            const res = await fetch(urlMotor);
            const data = await res.text();

            if(data !== "ERROR") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('room-display').innerText = "BÚNKER: " + currentRoom;
                startChat();
            } else {
                alert("ACCESO DENEGADO");
            }
        } catch (e) {
            alert("ERROR DE CONEXIÓN");
        }
    }

    function startChat() {
        const ref = db.ref('rooms/' + currentRoom);
        // Escucha mensajes nuevos
        ref.on('child_added', snap => {
            const data = snap.val();
            if(!document.getElementById('msg-' + snap.key)) {
                const div = document.createElement('div');
                div.id = 'msg-' + snap.key;
                div.className = 'msg ' + (data.user === currentUser ? 'me' : 'them');
                div.innerHTML = `<div style="font-size:9px; opacity:0.7;">${data.user}</div><div>${data.text}</div>`;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
        });
        // Escucha si alguien borra (Botón de Pánico)
        ref.on('value', snap => {
            if(!snap.exists()) { document.getElementById('messages').innerHTML = ''; }
        });
    }

    function sendMsg() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        db.ref('rooms/' + currentRoom).push({ user: currentUser, text: i.value.trim() });
        i.value = '';
    }

    // BOTÓN DE PÁNICO: Borra la base de datos real
    function nukeChat() {
        if(confirm("¿BORRADO TOTAL?")) {
            db.ref('rooms/' + currentRoom).remove();
        }
    }

    // LIMPIEZA AL SALIR: Borra la pantalla al cerrar
    window.addEventListener('beforeunload', () => {
        document.getElementById('messages').innerHTML = '';
    });
</script>
</body>
</html>
