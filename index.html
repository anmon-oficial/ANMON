<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANMON</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --neon: #39FF14; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #login-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; }
        .logo { font-size: 40px; font-weight: bold; color: var(--neon); letter-spacing: 10px; margin-bottom: 40px; text-shadow: 0 0 10px var(--neon); }
        input { background: #000; border: 1px solid #333; color: white; padding: 15px; margin-bottom: 10px; width: 100%; max-width: 300px; border-radius: 10px; text-align: center; font-size: 16px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; max-width: 300px; font-weight: bold; border-radius: 10px; cursor: pointer; text-transform: uppercase; }
        #chat-screen { height: 100vh; display: none; flex-direction: column; }
        #header { padding: 15px; border-bottom: 1px solid #1a1a1a; text-align: center; color: var(--neon); font-size: 12px; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 15px; border: 1px solid var(--neon); }
        .msg.me { align-self: flex-end; background: #111; border-color: #333; }
        #input-area { padding: 15px 15px 35px 15px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        #msg-input { flex-grow: 1; text-align: left; }
    </style>
</head>
<body>
<div id="login-screen">
    <div class="logo">ANMON</div>
    <input type="text" id="user-input" placeholder="USUARIO">
    <input type="text" id="room-input" placeholder="SALA">
    <input type="password" id="pin-input" placeholder="PIN">
    <button onclick="login()">ACCEDER AL BÚNKER</button>
</div>
<div id="chat-screen">
    <div id="header" id="room-name">BÚNKER ACTIVO</div>
    <div id="messages"></div>
    <div id="input-area"><input type="text" id="msg-input" placeholder="Mensaje..."><button onclick="sendMsg()">></button></div>
</div>
<script>
    const firebaseConfig = { databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser, currentRoom;

    function login() {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim();
        if(!currentUser || !currentRoom || !pin) return;

        // Búsqueda simplificada: busca directamente en la carpeta valid_pins
        db.ref('valid_pins').once('value', snapshot => {
            let found = false;
            snapshot.forEach(child => {
                // Si el nombre de la carpeta coincide O el valor de adentro coincide
                if (child.key === pin || child.val() === pin || (child.val() && child.val().pin === pin)) {
                    found = true;
                }
            });

            if(found) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                startChat();
            } else {
                alert("PIN INVÁLIDO");
            }
        });
    }

    function startChat() {
        const ref = db.ref('rooms/' + currentRoom);
        ref.on('child_added', snap => {
            const data = snap.val();
            const div = document.createElement('div');
            div.className = 'msg ' + (data.user === currentUser ? 'me' : 'them');
            div.innerHTML = `<div style="font-size:10px;color:var(--neon)">${data.user}</div>${data.text}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        db.ref('rooms/' + currentRoom).push({ user: currentUser, text: input.value.trim(), timestamp: Date.now() });
        input.value = '';
    }
</script>
</body>
</html>
