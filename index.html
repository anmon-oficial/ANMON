<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON Enterprise</title>
    <style>
        :root { --accent: #00f3ff; --corporate-blue: #0052cc; --bg-chat: #f0f2f5; --danger: #ff3b30; --input-bg: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        html, body { background: #000; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }

        /* PANTALLA DE ACCESO - ESTILO BÚNKER REFORZADO */
        #login-screen { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 20px; 
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }
        
        .logo-box { text-align: center; margin-bottom: 50px; }
        .logo { font-size: 52px; font-weight: 900; letter-spacing: 14px; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .sub-logo { color: var(--accent); font-size: 14px; letter-spacing: 7px; font-weight: 800; text-transform: uppercase; margin-top: 15px; }
        
        /* INPUTS ESTILO BLOQUE SÓLIDO OSCURO */
        .login-input { 
            background: var(--input-bg); 
            border: 1px solid #333; 
            color: #fff; 
            padding: 22px; 
            margin-bottom: 12px; 
            width: 100%; max-width: 340px; 
            border-radius: 18px; 
            text-align: center; 
            font-size: 17px; 
            font-weight: 600;
            outline: none; 
            transition: border-color 0.3s;
        }
        .login-input::placeholder { color: #555; font-weight: 500; }
        .login-input:focus { border-color: var(--accent); }

        /* BOTÓN ACCESO ESTILO LOGIN ORIGINAL */
        .btn-access { 
            background: #fff; color: #000; 
            border: none; 
            padding: 22px; 
            width: 100%; max-width: 340px; 
            border-radius: 18px; 
            font-weight: 900; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 15px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: background 0.3s;
        }
        .btn-access:active { background: #ccc; }

        /* INTERFAZ DE CHAT */
        #chat-screen { display: none; flex-direction: column; height: 100dvh; width: 100vw; background: var(--bg-chat); }
        
        #header { 
            padding: env(safe-area-inset-top, 44px) 20px 15px; 
            background: #fff; 
            border-bottom: 1px solid #ddd; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        #room-display { font-size: 16px; font-weight: 900; color: #000; letter-spacing: 1px; text-transform: uppercase; }

        /* BOTÓN DE PÁNICO EJECUTIVO */
        .panic-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 25px;
            background: #f9f9f9;
            border: 1px solid #eee;
        }
        .panic-circle {
            width: 12px;
            height: 12px;
            background-color: var(--danger);
            border-radius: 50%;
            animation: pulse-red 2s infinite;
        }
        .panic-text { font-size: 12px; font-weight: 800; color: #000; text-transform: uppercase; letter-spacing: 1px; }

        @keyframes pulse-red {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(255, 59, 48, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        #messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 14px 18px; border-radius: 20px; max-width: 85%; font-size: 18px; font-weight: 600; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: var(--corporate-blue); color: #fff; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #fff; color: #333; border-bottom-left-radius: 4px; border: 1px solid #e0e0e0; }
        
        .meta { font-size: 11px; margin-top: 6px; display: flex; justify-content: flex-end; align-items: center; gap: 4px; opacity: 0.8; }
        .check { color: #00f3ff; font-weight: bold; }

        #input-area { 
            background: #fff; 
            border-top: 1px solid #ddd; 
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); 
            display: flex; 
            gap: 12px; 
            align-items: center; 
        }
        #msg-input { flex: 1; background: #f0f2f5; border: 1px solid #ddd; padding: 16px 20px; border-radius: 30px; font-size: 17px; outline: none; }
        #send-btn { 
            width: 55px; height: 55px; 
            background: var(--corporate-blue); color: #fff; 
            border-radius: 50%; border: none; 
            font-size: 22px; font-weight: bold; 
            cursor: pointer; 
            transition: background 0.3s;
        }
        #send-btn:active { background: #0041a3; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo-box">
        <div class="logo"><span>🔒</span>ANMON</div>
        <div class="sub-logo">Bunker Digital</div>
    </div>
    <input type="text" id="user-input" class="login-input" placeholder="Nombre de Usuario" autocomplete="off">
    <input type="text" id="room-input" class="login-input" placeholder="ID de Bunker" autocomplete="off">
    <input type="password" id="pin-input" class="login-input" placeholder="PIN de Seguridad" autocomplete="off">
    <button class="btn-access" onclick="login()">Autenticar Conexión</button>
</div>

<div id="chat-screen">
    <div id="header">
        <div id="room-display">BÚNKER</div>
        <div class="panic-container" onclick="nukeChat()">
            <div class="panic-circle"></div>
            <span class="panic-text">Depurar Búnker</span>
        </div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Escribir mensaje seguro..." autocomplete="off">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, push, onValue, remove, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentUser, currentRoom;

    window.login = async () => {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim().toUpperCase();

        if(!currentUser || !currentRoom || !pin) return;

        const snapshot = await get(ref(db, 'valid_pins/' + pin));
        
        if (snapshot.exists()) {
            const pinData = snapshot.val();
            // Verificar si el PIN ha expirado
            if (pinData.expires && pinData.expires < Date.now()) {
                alert("PIN EXPIRADO. SOLICITE UNO NUEVO.");
                return;
            }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('room-display').innerText = "SALA: " + currentRoom;
            startChat();
        } else {
            alert("ACCESO DENEGADO. PIN INCORRECTO.");
        }
    };

    function startChat() {
        const chatRef = ref(db, 'rooms/' + currentRoom);
        
        // Listener para limpiar la pantalla si alguien borra la sala
        onValue(chatRef, (snap) => {
            if (!snap.exists()) {
                document.getElementById('messages').innerHTML = '';
            }
        });

        onChildAdded(chatRef, (data) => {
            if (document.getElementById('msg-' + data.key)) return;
            const msg = data.val();
            const div = document.createElement('div');
            div.id = 'msg-' + data.key;
            const isMe = msg.user === currentUser;
            div.className = 'msg ' + (isMe ? 'me' : 'them');
            const time = new Date(msg.ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            div.innerHTML = `
                <div style="font-size:11px; opacity:0.7; margin-bottom:5px; font-weight:800;">${msg.user}</div>
                <div>${msg.text}</div>
                <div class="meta">${time} ${isMe ? '<span class="check">✓✓</span>' : ''}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    }

    window.sendMsg = () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        push(ref(db, 'rooms/' + currentRoom), {
            user: currentUser,
            text: input.value.trim(),
            ts: Date.now()
        });
        input.value = '';
    };

    window.nukeChat = async () => {
        if(confirm("¿DEPURAR BÚNKER? Esta acción eliminará todo el historial para todos los usuarios.")) {
            await remove(ref(db, 'rooms/' + currentRoom));
        }
    };
</script>
</body>
</html>
