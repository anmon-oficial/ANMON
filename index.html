<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON Enterprise</title>
    <style>
        :root { --accent: #007aff; --bg: #000; --msg-them: #2c2c2e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; }
        .logo { font-size: 38px; font-weight: 800; letter-spacing: 10px; margin-bottom: 5px; }
        .sub { color: var(--accent); font-size: 10px; letter-spacing: 5px; font-weight: 800; text-transform: uppercase; margin-bottom: 40px; }
        
        input { width: 100%; max-width: 320px; background: #111; border: 1px solid #333; color: #fff; padding: 18px; border-radius: 12px; margin-bottom: 10px; font-size: 16px; text-align: center; outline: none; }
        .btn-access { width: 100%; max-width: 320px; background: #fff; color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        .mail-link { margin-top: 40px; color: #666; font-size: 12px; text-decoration: none; font-weight: 700; letter-spacing: 1px; }
        .mail-link span { color: var(--accent); }

        #chat-screen { display: none; flex-direction: column; height: 100%; }
        #header { padding: 50px 20px 15px; background: #111; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { padding: 14px 18px; border-radius: 20px; max-width: 85%; font-size: 15px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: var(--msg-them); color: #fff; border-bottom-left-radius: 4px; }

        #input-area { padding: 15px; background: #111; display: flex; gap: 10px; align-items: center; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        #msg-input { flex: 1; background: var(--msg-them); border: none; padding: 14px 20px; border-radius: 25px; color: #fff; font-size: 16px; outline: none; }
        #send-btn { width: 45px; height: 45px; background: var(--accent); color: #fff; border-radius: 50%; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="logo">ANMON</div>
        <div class="sub">Bunker Digital</div>
        <input type="text" id="user-input" placeholder="OPERADOR">
        <input type="text" id="room-input" placeholder="ID BÚNKER">
        <input type="password" id="pin-input" placeholder="PIN SEGURIDAD">
        <button class="btn-access" onclick="login()">AUTENTICAR</button>
        <a href="mailto:anmon@proton.me" class="mail-link">SOLICITAR PIN: <span>ANMON@PROTON.ME</span></a>
    </div>

    <div id="chat-screen">
        <div id="header">
            <div id="room-display" style="font-size:11px; font-weight:900; letter-spacing:2px;">SALA: --</div>
            <div onclick="location.reload()" style="font-size:10px; color:#666; font-weight:800; cursor:pointer;">CERRAR</div>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Mensaje..." autocomplete="off">
            <button id="send-btn" onclick="sendMsg()">></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0", authDomain: "anmon-c2f58.firebaseapp.com", databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com", projectId: "anmon-c2f58" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUser, currentRoom;

        window.login = async () => {
            currentUser = document.getElementById('user-input').value.trim().toUpperCase();
            currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
            const pin = document.getElementById('pin-input').value.trim().toUpperCase();
            if(!currentUser || !currentRoom || !pin) return;

            const snap = await get(ref(db, 'valid_pins/' + pin));
            if(snap.exists()){
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('room-display').innerText = "SALA: " + currentRoom.toUpperCase();
                
                const chatRef = ref(db, 'rooms/' + currentRoom);
                onChildAdded(chatRef, (d) => {
                    const m = d.val();
                    const div = document.createElement('div');
                    div.className = 'msg ' + (m.user === currentUser ? 'me' : 'them');
                    div.innerHTML = `<div style="font-size:9px; opacity:0.6; margin-bottom:4px; font-weight:800;">${m.user}</div>${m.text}`;
                    document.getElementById('messages').appendChild(div);
                    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
                });
            } else { alert("PIN INVÁLIDO"); }
        };

        window.sendMsg = () => {
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;
            push(ref(db, 'rooms/' + currentRoom), { user: currentUser, text: input.value.trim(), ts: Date.now() });
            input.value = '';
        };
    </script>
</body>
</html>
