<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON Enterprise</title>
    <style>
        :root { --accent: #00f3ff; --corp-blue: #0052cc; --bg-chat: #0a0a0a; --danger: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'SF Pro Display', -apple-system, sans-serif; }
        html, body { background: #000; margin: 0; padding: 0; height: 100dvh; width: 100vw; overflow: hidden; color: #fff; }

        /* PANTALLA DE ACCESO - CORREGIDA */
        #login-screen { 
            position: fixed; inset: 0; 
            background: #000; 
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; 
        }
        .logo-box { text-align: center; margin-bottom: 50px; }
        .logo { font-size: 42px; font-weight: 900; letter-spacing: 12px; color: #fff; margin: 0; }
        .sub-logo { color: var(--accent); font-size: 11px; letter-spacing: 6px; font-weight: 800; text-transform: uppercase; margin-top: 15px; }
        
        /* Inputs con tamaño de fuente 16px para evitar zoom de iOS */
        .login-input { 
            background: #111; border: 1px solid #333; color: #fff; padding: 20px; 
            margin-bottom: 12px; width: 100%; max-width: 320px; border-radius: 16px; 
            text-align: center; font-size: 16px; outline: none; 
        }
        .btn-access { 
            background: #fff; color: #000; border: none; padding: 20px; 
            width: 100%; max-width: 320px; border-radius: 16px; 
            font-weight: 900; font-size: 14px; cursor: pointer; margin-top: 20px; 
            text-transform: uppercase; letter-spacing: 2px; 
        }

        /* INTERFAZ DE CHAT - MODO OSCURO PROFESIONAL */
        #chat-screen { display: none; flex-direction: column; height: 100dvh; width: 100vw; background: #000; }
        
        #header { 
            padding: env(safe-area-inset-top, 44px) 20px 15px; 
            background: #000; border-bottom: 1px solid #222; 
            display: flex; justify-content: space-between; align-items: center; 
        }

        #room-display { font-size: 13px; font-weight: 900; color: #fff; letter-spacing: 2px; }

        .panic-container { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 12px; border-radius: 20px; background: #111; border: 1px solid #333; }
        .panic-circle { width: 10px; height: 10px; background-color: var(--danger); border-radius: 50%; box-shadow: 0 0 10px var(--danger); }
        .panic-text { font-size: 10px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1px; }

        #messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 15px; background: #000; }
        .msg { padding: 15px; border-radius: 18px; max-width: 85%; font-size: 16px; font-weight: 500; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #1a1a1a; color: #fff; border-bottom-left-radius: 4px; border: 1px solid #333; }
        
        .meta { font-size: 10px; margin-top: 6px; display: flex; justify-content: flex-end; gap: 4px; opacity: 0.6; }

        #input-area { 
            background: #000; border-top: 1px solid #222; 
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); 
            display: flex; gap: 10px; align-items: center; 
        }
        #msg-input { flex: 1; background: #111; border: 1px solid #333; padding: 15px 20px; border-radius: 25px; color: #fff; font-size: 16px; outline: none; }
        #send-btn { width: 50px; height: 50px; background: #fff; color: #000; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo-box">
        <div class="logo">ANMON</div>
        <div class="sub-logo">Bunker Digital</div>
    </div>
    <input type="text" id="user-input" class="login-input" placeholder="Nombre de Usuario">
    <input type="text" id="room-input" class="login-input" placeholder="ID de Bunker">
    <input type="password" id="pin-input" class="login-input" placeholder="PIN de Seguridad">
    <button class="btn-access" onclick="login()">Autenticar</button>
</div>

<div id="chat-screen">
    <div id="header">
        <div id="room-display">SALA: --</div>
        <div class="panic-container" onclick="nukeChat()">
            <div class="panic-circle"></div>
            <span class="panic-text">Depurar</span>
        </div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Mensaje seguro..." autocomplete="off">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, push, onValue, remove, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0",
        authDomain: "anmon-c2f58.firebaseapp.com",
        databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com",
        projectId: "anmon-c2f58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentUser, currentRoom;

    window.login = async () => {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim().toUpperCase();

        if(!currentUser || !currentRoom || !pin) return;

        const snapshot = await get(ref(db, 'valid_pins/' + pin));
        if (snapshot.exists()) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('room-display').innerText = currentRoom.toUpperCase();
            startChat();
        } else {
            alert("ACCESO DENEGADO");
        }
    };

    function startChat() {
        const chatRef = ref(db, 'rooms/' + currentRoom);
        onValue(chatRef, (snap) => { if (!snap.exists()) document.getElementById('messages').innerHTML = ''; });

        onChildAdded(chatRef, (data) => {
            if (document.getElementById('msg-' + data.key)) return;
            const msg = data.val();
            const div = document.createElement('div');
            div.id = 'msg-' + data.key;
            const isMe = msg.user === currentUser;
            div.className = 'msg ' + (isMe ? 'me' : 'them');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            div.innerHTML = `
                <div style="font-size:10px; opacity:0.6; margin-bottom:4px; font-weight:800;">${msg.user}</div>
                <div>${msg.text}</div>
                <div class="meta">${time} ${isMe ? '✓✓' : ''}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    }

    window.sendMsg = () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        push(ref(db, 'rooms/' + currentRoom), { user: currentUser, text: input.value.trim(), ts: Date.now() });
        input.value = '';
    };

    window.nukeChat = async () => {
        if(confirm("¿DEPURAR BÚNKER?")) await remove(ref(db, 'rooms/' + currentRoom));
    };
</script>
</body>
</html>
