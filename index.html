<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #2ecc71; --bg: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #eee; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .login-input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 16px; margin-bottom: 10px; width: 100%; max-width: 300px; border-radius: 10px; text-align: center; font-size: 18px; }
        
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        #header { padding: 50px 20px 15px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; flex-shrink: 0; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #0d0d0d; }
        
        /* BURBUJAS CORREGIDAS */
        .msg { 
            padding: 12px 16px; 
            border-radius: 18px; 
            max-width: 85%; 
            font-size: 17px; 
            position: relative;
            word-wrap: break-word; /* EVITA QUE EL TEXTO SE SALGA */
            overflow-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.4;
        }
        .msg.me { align-self: flex-end; background: #2c3e50; color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #222; border: 1px solid #444; border-bottom-left-radius: 2px; }

        .info-row { display: flex; justify-content: flex-end; align-items: center; margin-top: 6px; font-size: 12px; opacity: 0.6; }
        .del-btn { color: #e74c3c; margin-left: 12px; cursor: pointer; font-size: 16px; padding: 2px; }

        #input-area { 
            padding: 15px 15px 35px; 
            background: #1a1a1a; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #333;
            flex-shrink: 0;
        }
        #msg-input { flex: 1; background: #252525; border: 1px solid #555; color: white; padding: 14px; border-radius: 25px; font-size: 17px; outline: none; }
        #send-btn { background: var(--accent); border: none; width: 50px; height: 50px; border-radius: 50%; font-weight: bold; font-size: 20px; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="font-size: 35px; color: var(--accent); font-weight: 900; margin-bottom: 30px; letter-spacing: 6px;">ANMON</div>
    <input type="text" id="user-input" class="login-input" placeholder="USUARIO" autocomplete="off">
    <input type="text" id="room-input" class="login-input" placeholder="SALA" autocomplete="off">
    <input type="password" id="pin-input" class="login-input" placeholder="PIN">
    <button onclick="login()" style="background: var(--accent); padding: 18px; width: 100%; max-width: 300px; border-radius: 12px; font-weight: bold; border: none; font-size: 16px;">ENTRAR AL BÚNKER</button>
</div>

<div id="chat-screen">
    <div id="header">
        <div id="room-display" style="color:var(--accent); font-weight: 800; font-size: 14px; letter-spacing: 1px;">SALA</div>
        <div onclick="nukeChat()" style="font-size: 24px; cursor: pointer;">🧨</div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Escribir..." autocomplete="off">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser, currentRoom;

    function login() {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim();
        if(!currentUser || !currentRoom || !pin) return;

        db.ref('valid_pins').once('value', snap => {
            let found = false;
            snap.forEach(c => { if(c.key === pin || (c.val() && (c.val() === pin || c.val().pin === pin))) found = true; });
            if(found) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('room-display').innerText = "BÚNKER: " + currentRoom.toUpperCase();
                startChat();
            } else { alert("ACCESO DENEGADO"); }
        });
    }

    function startChat() {
        const ref = db.ref('rooms/' + currentRoom);
        ref.on('child_added', snap => {
            const data = snap.val();
            if(!document.getElementById('msg-' + snap.key)) {
                const div = document.createElement('div');
                div.id = 'msg-' + snap.key;
                div.className = 'msg ' + (data.user === currentUser ? 'me' : 'them');
                const delIcon = data.user === currentUser ? `<span class="del-btn" onclick="deleteMsg('${snap.key}')">🗑️</span>` : '';
                
                div.innerHTML = `<div style="font-size:10px;color:var(--accent);font-weight:bold;margin-bottom:4px;">${data.user}</div>
                                 <div>${data.text}</div>
                                 <div class="info-row">
                                    <span id="check-${snap.key}">${data.read ? '✓✓' : '✓'}</span>
                                    ${delIcon}
                                 </div>`;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
            if(data.user !== currentUser && !data.read) ref.child(snap.key).update({read:true});
        });

        ref.on('child_removed', snap => {
            const el = document.getElementById('msg-' + snap.key);
            if(el) el.remove();
        });

        ref.on('child_changed', snap => {
            const el = document.getElementById('check-' + snap.key);
            if(el && snap.val().read) el.innerText = '✓✓';
        });
    }

    function sendMsg() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        db.ref('rooms/' + currentRoom).push({user:currentUser, text:i.value.trim(), timestamp:Date.now(), read:false});
        i.value = '';
    }

    function deleteMsg(id) {
        if(confirm("¿Borrar mensaje?")) {
            db.ref('rooms/' + currentRoom + '/' + id).remove();
        }
    }

    function nukeChat() {
        if(confirm("¿VACIAR TODO EL BÚNKER?")) {
            db.ref('rooms/' + currentRoom).remove();
            document.getElementById('messages').innerHTML = '';
        }
    }
</script>
</body>
</html>
