<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON | BÚNKER</title>
    <style>
        :root { 
            --bg-login: #121212; 
            --bg-chat: #F2F2F7; 
            --panel: #252527; 
            --silver: #c0c0c0; 
            --success-glow: #00ff41; 
            --accent: #007AFF; 
            --line-me: #0052cc;
            --line-them: #ffffff; 
            --panic: #ff3b30;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* PROTECCIÓN: BORROSO AL SALIR */
        body.blur-mode { filter: blur(25px); transition: 0.2s; }

        body { 
            background: var(--bg-login); color: #000; margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100dvh; width: 100vw; overflow: hidden;
        }

        /* MARCA DE AGUA ANTI-CAPTURA */
        #watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 80px; font-weight: 900; opacity: 0.05; pointer-events: none;
            z-index: 999; text-transform: uppercase; white-space: nowrap; display: none;
        }

        /* LOGIN SCREEN ORIGINAL */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; padding: 20px; color: #fff; }
        .shield { font-size: 60px; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--success-glow)); }
        .logo-main { font-size: 38px; font-weight: 900; letter-spacing: 12px; margin: 0; }
        .logo-sub { font-size: 10px; letter-spacing: 6px; color: var(--silver); margin-bottom: 40px; }
        
        input { width: 100%; max-width: 320px; background: #1c1c1e; border: 1px solid #333; color: #fff; padding: 18px; border-radius: 14px; margin-bottom: 12px; font-size: 16px; text-align: center; outline: none; }
        .btn-access { width: 100%; max-width: 320px; background: #fff; color: #000; border: none; padding: 18px; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 15px; }
        .support { margin-top: 30px; font-size: 11px; color: #555; text-decoration: none; }
        .support span { color: var(--accent); }

        /* CHAT INTERFACE ORIGINAL */
        #chat-screen { display: none; flex-direction: column; height: 100%; width: 100%; background: var(--bg-chat); }
        header { padding: 50px 20px 15px; background: #000; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { padding: 12px 16px; border-radius: 14px; max-width: 85%; font-size: 15px; line-height: 1.4; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg.me { align-self: flex-end; background: #fff; color: #000; border-left: 4px solid var(--line-me); }
        .msg.them { align-self: flex-start; background: #fff; color: #000; border-left: 4px solid var(--line-them); }
        .u-tag { font-size: 9px; font-weight: 800; opacity: 0.4; margin-bottom: 4px; display: block; text-transform: uppercase; }

        #typing-status { height: 20px; font-size: 11px; color: var(--accent); padding-left: 25px; opacity: 0; font-weight: 600; }
        footer { padding: 15px; background: #fff; display: flex; gap: 10px; border-top: 1px solid #ddd; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        #m-input { flex: 1; background: #f0f0f5; border: none; padding: 14px 20px; border-radius: 30px; color: #000; outline: none; font-size: 16px; }
        .btn-send { background: var(--accent); color: #fff; border: none; width: 48px; height: 48px; border-radius: 50%; font-weight: bold; font-size: 20px; }
        .btn-nuke { background: var(--panic); color: #fff; border: none; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body>

    <div id="watermark"></div>

    <div id="login-screen">
        <div class="shield">🛡️</div>
        <h1 class="logo-main">ANMON</h1>
        <div class="logo-sub">SISTEMA OPERATIVO</div>
        <input type="text" id="u-input" placeholder="OPERADOR">
        <input type="text" id="r-input" placeholder="ID BÚNKER">
        <input type="password" id="p-input" placeholder="PIN DE ACCESO">
        <button class="btn-access" onclick="login()">INICIAR SESIÓN SEGURA</button>
        <a href="mailto:nexo.seguro01@proton.me" class="support">SOLICITAR PIN: <span>nexo.seguro01@proton.me</span></a>
    </div>

    <div id="chat-screen">
        <header>
            <div id="room-id" style="font-size: 11px; font-weight: 800; letter-spacing: 1px; color: var(--success-glow);">BÚNKER ACTIVO</div>
            <button class="btn-nuke" onclick="nuke()">PURGAR TODO</button>
        </header>
        <div id="messages"></div>
        <div id="typing-status">...</div>
        <footer>
            <input type="text" id="m-input" placeholder="Mensaje..." autocomplete="off">
            <button class="btn-send" onclick="sendMsg()">></button>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, push, onValue, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0", 
            authDomain: "anmon-c2f58.firebaseapp.com", 
            databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com", 
            projectId: "anmon-c2f58" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUser, currentRoom;

        window.onblur = () => document.body.classList.add('blur-mode');
        window.onfocus = () => document.body.classList.remove('blur-mode');

        window.login = async () => {
            const u = document.getElementById('u-input').value.trim().toUpperCase();
            const r = document.getElementById('r-input').value.trim().toLowerCase();
            const p = document.getElementById('p-input').value.trim();

            if(!u || !r || !p) return;

            const pinSnap = await get(ref(db, 'valid_pins/' + p));
            if(pinSnap.exists()) {
                currentUser = u;
                currentRoom = r;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                const wm = document.getElementById('watermark');
                wm.innerText = u;
                wm.style.display = 'block';
                initChat();
            } else {
                alert("ACCESO DENEGADO");
            }
        };

        function initChat() {
            const messagesDiv = document.getElementById('messages');
            onValue(ref(db, 'rooms/' + currentRoom), (snap) => {
                if (!snap.exists()) { messagesDiv.innerHTML = ''; }
            });

            onChildAdded(ref(db, 'rooms/' + currentRoom + '/messages'), (snap) => {
                const m = snap.val();
                const div = document.createElement('div');
                const isMe = m.user === currentUser;
                div.className = `msg ${isMe ? 'me' : 'them'}`;
                div.innerHTML = `<span class="u-tag">${m.user}</span><div>${m.text}</div>`;
                messagesDiv.appendChild(div);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });

            onValue(ref(db, 'rooms/' + currentRoom + '/typing'), (snap) => {
                const data = snap.val();
                const statusDiv = document.getElementById('typing-status');
                let users = [];
                for (let u in data) if (u !== currentUser && data[u] === true) users.push(u);
                statusDiv.style.opacity = users.length > 0 ? "1" : "0";
                statusDiv.innerText = users.join(', ') + " está escribiendo...";
            });
        }

        let tT;
        document.getElementById('m-input').addEventListener('input', () => {
            if (!currentUser) return;
            set(ref(db, 'rooms/' + currentRoom + '/typing/' + currentUser), true);
            clearTimeout(tT);
            tT = setTimeout(() => { set(ref(db, 'rooms/' + currentRoom + '/typing/' + currentUser), false); }, 2000);
        });

        window.sendMsg = () => {
            const input = document.getElementById('m-input');
            if(!input.value.trim()) return;
            set(ref(db, 'rooms/' + currentRoom + '/typing/' + currentUser), false);
            push(ref(db, 'rooms/' + currentRoom + '/messages'), { user: currentUser, text: input.value.trim(), ts: Date.now() });
            input.value = '';
        };

        window.nuke = () => {
            if(confirm("¿DEPURAR BÚNKER? Se borrará todo para todos.")) {
                remove(ref(db, 'rooms/' + currentRoom));
            }
        };

        document.getElementById('m-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>
