<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #00b4d8; --bg: #e0e0e0; --msg-me: #ffffff; --msg-them: #d1d1d1; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Arial', sans-serif; }
        
        html, body { background: var(--bg); margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; color: #000; }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .logo { font-size: 50px; color: #00f3ff; font-weight: 900; letter-spacing: 12px; margin-bottom: 30px; }
        .login-input { background: #111; border: 2px solid #333; color: #00f3ff; padding: 20px; margin-bottom: 15px; width: 100%; max-width: 350px; border-radius: 10px; text-align: center; font-size: 20px; outline: none; }
        .neon-blink { background: #000; color: #00f3ff; border: 3px solid #00f3ff; padding: 20px; width: 100%; max-width: 350px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 0 15px rgba(0, 243, 255, 0.5); }

        /* CHAT VISIBILIDAD ALTA */
        #chat-screen { display: none; flex-direction: column; height: 100dvh; width: 100vw; background: var(--bg); }
        #header { padding: env(safe-area-inset-top, 44px) 20px 15px; background: #fff; border-bottom: 2px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { padding: 15px 20px; border-radius: 15px; max-width: 85%; font-size: 22px; font-weight: bold; line-height: 1.2; word-wrap: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg.me { align-self: flex-end; background: var(--msg-me); color: #000; border: 1px solid #bbb; }
        .msg.them { align-self: flex-start; background: var(--msg-them); color: #000; }

        #input-area { background: #fff; border-top: 2px solid #ccc; padding: 15px; display: flex; gap: 10px; align-items: center; }
        #msg-input { flex: 1; background: #f0f0f0; border: 2px solid #ccc; color: #000; padding: 16px; border-radius: 10px; font-size: 20px; font-weight: bold; outline: none; }
        #send-btn { width: 60px; height: 60px; background: #000; color: #fff; border-radius: 10px; border: none; font-weight: bold; font-size: 24px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo">ANMON</div>
    <input type="text" id="user-input" class="login-input" placeholder="USUARIO">
    <input type="text" id="room-input" class="login-input" placeholder="BUNKER ID">
    <input type="password" id="pin-input" class="login-input" placeholder="PIN">
    <button class="neon-blink" onclick="login()">ACCEDER</button>
</div>

<div id="chat-screen">
    <div id="header">
        <div id="room-display" style="font-weight: 900; font-size: 16px;">SALA</div>
        <div onclick="nukeChat()" style="font-size: 35px; cursor: pointer;">🧨</div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Mensaje...">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser, currentRoom;

    async function login() {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim();
        if(!currentUser || !currentRoom || !pin) return;

        const urlMotor = "https://motor-anmon.nexo-seguro01.workers.dev/acceso?pin=" + pin;
        try {
            const res = await fetch(urlMotor);
            const data = await res.text();
            if(data !== "ERROR") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('room-display').innerText = "SALA: " + currentRoom;
                startChat();
            } else { alert("PIN INVÁLIDO"); }
        } catch (e) { alert("ERROR DE CONEXIÓN"); }
    }

    function startChat() {
        const ref = db.ref('rooms/' + currentRoom);
        
        // REFUERZO BOTÓN DE PÁNICO: Si la sala desaparece, limpia la pantalla
        ref.on('value', snap => {
            if (!snap.exists()) {
                document.getElementById('messages').innerHTML = '';
            }
        });

        ref.on('child_added', snap => {
            const data = snap.val();
            if(!document.getElementById('msg-' + snap.key)) {
                const div = document.createElement('div');
                div.id = 'msg-' + snap.key;
                div.className = 'msg ' + (data.user === currentUser ? 'me' : 'them');
                div.innerHTML = `<div style="font-size:12px; color:#555; margin-bottom:5px;">${data.user}</div><div>${data.text}</div>`;
                document.getElementById('messages').appendChild(div);
                const container = document.getElementById('messages');
                container.scrollTop = container.scrollHeight;
            }
        });
    }

    function sendMsg() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        db.ref('rooms/' + currentRoom).push({ user: currentUser, text: i.value.trim() });
        i.value = '';
    }

    function nukeChat() {
        if(confirm("¿BORRAR TODO?")) {
            db.ref('rooms/' + currentRoom).set(null); 
        }
    }
</script>
</body>
</html>
