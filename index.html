<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANMON</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --neon: #39FF14; --bg: #000000; --panel: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #login-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; z-index: 10; background: var(--bg); }
        .logo { font-size: 42px; font-weight: 800; color: var(--neon); letter-spacing: 10px; margin-bottom: 50px; text-shadow: 0 0 15px rgba(57, 255, 20, 0.5); }
        input { background: #000; border: 1px solid #222; color: white; padding: 18px; margin-bottom: 15px; width: 100%; max-width: 320px; border-radius: 12px; font-size: 16px; transition: 0.3s; text-align: center; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }
        button { background: var(--neon); color: black; border: none; padding: 18px; width: 100%; max-width: 320px; font-weight: 900; border-radius: 12px; font-size: 15px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; margin-top: 10px; }
        button:active { transform: scale(0.98); opacity: 0.8; }

        #chat-screen { height: 100vh; display: none; flex-direction: column; }
        #header { padding: 18px; background: var(--panel); border-bottom: 1px solid #1a1a1a; text-align: center; color: var(--neon); font-weight: bold; letter-spacing: 3px; font-size: 14px; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: var(--bg); }
        
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: #111; border: 1px solid #222; border-bottom-right-radius: 4px; color: #eee; }
        .msg.them { align-self: flex-start; background: #000; border: 1px solid var(--neon); border-bottom-left-radius: 4px; color: #fff; }
        
        .meta { font-size: 10px; margin-top: 6px; display: flex; justify-content: flex-end; align-items: center; opacity: 0.5; font-family: monospace; }
        .check { color: var(--neon); margin-left: 5px; font-weight: bold; font-size: 12px; }

        #input-area { padding: 15px 15px 35px 15px; background: var(--panel); display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        #msg-input { margin-bottom: 0; flex-grow: 1; border-radius: 30px; padding: 14px 20px; text-align: left; background: #000; border: 1px solid #222; }
        #send-btn { width: 50px; height: 50px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; margin-top: 0; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo">ANMON</div>
    <input type="text" id="user-input" placeholder="USUARIO" spellcheck="false">
    <input type="text" id="room-input" placeholder="SALA" spellcheck="false">
    <input type="password" id="pin-input" placeholder="PIN">
    <button onclick="login()">ACCEDER AL BÚNKER</button>
</div>

<div id="chat-screen">
    <div id="header">BÚNKER ACTIVO</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Mensaje secreto..." autocomplete="off">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script>
    // URL CONFIGURADA CON TU FIREBASE REAL (anmon-c2f58)
    const firebaseConfig = { databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser, currentRoom;
    const EXPIRATION = 24 * 60 * 60 * 1000; 

    function login() {
        currentUser = document.getElementById('user-input').value.trim().toUpperCase();
        currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
        const pin = document.getElementById('pin-input').value.trim();

        if(!currentUser || !currentRoom || !pin) return;

        db.ref('pins/' + pin).once('value', snapshot => {
            if(snapshot.exists()){
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('header').innerText = "SALA: " + currentRoom.toUpperCase();
                startBunker();
            } else {
                alert("ACCESO DENEGADO: PIN INVÁLIDO");
            }
        });
    }

    function startBunker() {
        const ref = db.ref('rooms/' + currentRoom);
        const now = Date.now();
        
        ref.once('value', snap => {
            snap.forEach(child => {
                if (now - child.val().timestamp > EXPIRATION) child.ref.remove();
            });
        });

        ref.on('child_added', snapshot => {
            const data = snapshot.val();
            renderMsg(snapshot.key, data);
            if(data.user !== currentUser && !data.read) {
                ref.child(snapshot.key).update({read: true});
            }
        });

        ref.on('child_changed', snapshot => {
            const data = snapshot.val();
            const checkEl = document.getElementById('check-' + snapshot.key);
            if(checkEl && data.read) checkEl.innerText = '✓✓';
        });
    }

    function renderMsg(id, data) {
        if(document.getElementById('msg-' + id)) return;
        const div = document.createElement('div');
        div.id = 'msg-' + id;
        div.className = 'msg ' + (data.user === currentUser ? 'me' : 'them');
        const time = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        div.innerHTML = `
            <div style="font-size:9px; color:var(--neon); margin-bottom:4px; font-weight:bold">${data.user}</div>
            <div>${data.text}</div>
            <div class="meta">${time} <span class="check" id="check-${id}">${data.read ? '✓✓' : '✓'}</span></div>
        `;
        const container = document.getElementById('messages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text) return;

        db.ref('rooms/' + currentRoom).push({
            user: currentUser,
            text: text,
            timestamp: Date.now(),
            read: false
        });
        input.value = '';
        input.focus();
    }
</script>
</body>
</html>
