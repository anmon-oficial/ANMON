<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANMON</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --neon: #39FF14; --bg: #000000; --card: #111111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        #login-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .logo { font-size: 40px; font-weight: bold; color: var(--neon); letter-spacing: 8px; margin-bottom: 40px; text-shadow: 0 0 10px var(--neon); }
        input { background: #000; border: 1px solid #333; color: white; padding: 15px; margin-bottom: 15px; width: 100%; max-width: 320px; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 5px var(--neon); }
        button { background: var(--neon); color: black; border: none; padding: 15px; width: 100%; max-width: 320px; font-weight: bold; border-radius: 8px; font-size: 16px; cursor: pointer; }

        #chat-screen { height: 100vh; display: none; flex-direction: column; background: var(--bg); }
        #header { padding: 15px; background: #050505; border-bottom: 1px solid #1a1a1a; text-align: center; color: var(--neon); font-weight: bold; letter-spacing: 2px; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 15px; line-height: 1.4; position: relative; animation: slideUp 0.2s ease; }
        .msg.me { align-self: flex-end; background: #1a1a1a; border: 1px solid #333; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #000; border: 1px solid var(--neon); border-bottom-left-radius: 2px; }
        
        .meta { font-size: 10px; margin-top: 5px; display: flex; justify-content: flex-end; align-items: center; opacity: 0.6; }
        .check { color: var(--neon); margin-left: 4px; font-weight: bold; }

        #input-area { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; padding-bottom: 30px; }
        #msg-input { margin-bottom: 0; flex-grow: 1; border-radius: 25px; padding: 12px 20px; }
        #send-btn { width: 50px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo">ANMON</div>
    <input type="text" id="user-input" placeholder="USUARIO">
    <input type="text" id="room-input" placeholder="SALA">
    <input type="password" id="pin-input" placeholder="PIN">
    <button onclick="login()">ACCEDER AL BÚNKER</button>
</div>

<div id="chat-screen">
    <div id="header">SALA PRIVADA</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Escribir...">
        <button id="send-btn" onclick="sendMsg()">></button>
    </div>
</div>

<script>
    // Asegurate que esta URL sea la de TU Firebase
    const firebaseConfig = { databaseURL: "https://anmon-oficial-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser, currentRoom;
    const EXPIRATION = 24 * 60 * 60 * 1000; 

    function login() {
        currentUser = document.getElementById('user-input').value.trim();
        currentRoom = document.getElementById('room-input').value.trim();
        const pin = document.getElementById('pin-input').value.trim();

        if(!currentUser || !currentRoom || !pin) return;

        db.ref('pins/' + pin).once('value', snapshot => {
            if(snapshot.exists()){
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('header').innerText = currentRoom.toUpperCase();
                cleanAndLoad();
            } else { alert("PIN INVÁLIDO"); }
        });
    }

    function cleanAndLoad() {
        const now = Date.now();
        const ref = db.ref('rooms/' + currentRoom);
        
        ref.once('value', snap => {
            snap.forEach(child => {
                if (now - child.val().timestamp > EXPIRATION) child.ref.remove();
            });
        });

        ref.on('child_added', snapshot => {
            const data = snapshot.val();
            render(snapshot.key, data);
            if(data.user !== currentUser && !data.read) ref.child(snapshot.key).update({read: true});
        });

        ref.on('child_changed', snapshot => {
            const el = document.getElementById('check-' + snapshot.key);
            if(el && snapshot.val().read) el.innerText = '✓✓';
        });
    }

    function render(id, data) {
        if(document.getElementById('msg-' + id)) return;
        const div = document.createElement('div');
        div.id = 'msg-' + id;
        div.className = 'msg ' + (data.user === currentUser ? 'me' : 'them');
        const time = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        div.innerHTML = `
            <div style="font-size:10px; color:var(--neon); margin-bottom:3px">${data.user}</div>
            <div>${data.text}</div>
            <div class="meta">${time} <span class="check" id="check-${id}">${data.read ? '✓✓' : '✓'}</span></div>
        `;
        const container = document.getElementById('messages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        db.ref('rooms/' + currentRoom).push({
            user: currentUser,
            text: input.value.trim(),
            timestamp: Date.now(),
            read: false
        });
        input.value = '';
    }
</script>
</body>
</html>
