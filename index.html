<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANMON | BÚNKER SEGURO</title>
    <style>
        :root { 
            --bg-login: #000; 
            --bg-chat: #121212; 
            --panel: #1c1c1e; 
            --accent: #007AFF; 
            --msg-me: #007AFF;
            --msg-them: #2c2c2e;
            --panic: #ff3b30;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* PROTECCIÓN 1: BORROSO SI SALEN DEL CHAT */
        body.blur-mode { filter: blur(25px); transition: 0.2s; }

        body { 
            background: var(--bg-login); color: #fff; margin: 0; 
            font-family: -apple-system, sans-serif;
            height: 100dvh; width: 100vw; overflow: hidden;
        }

        /* PROTECCIÓN 2: MARCA DE AGUA CON NOMBRE DEL USUARIO */
        #watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 80px; font-weight: 900; opacity: 0.05; pointer-events: none;
            z-index: 999; text-transform: uppercase; white-space: nowrap; display: none;
        }

        /* LOGIN */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 30px; }
        .logo { font-size: 32px; font-weight: 800; letter-spacing: 10px; margin-bottom: 5px; }
        .sub-logo { font-size: 10px; letter-spacing: 4px; color: var(--accent); margin-bottom: 40px; font-weight: 700; }
        input { width: 100%; max-width: 300px; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 16px; border-radius: 12px; margin-bottom: 10px; font-size: 16px; text-align: center; outline: none; }
        .btn-access { width: 100%; max-width: 300px; background: #fff; color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; }

        /* INTERFAZ DE CHAT */
        #chat-screen { display: none; flex-direction: column; height: 100%; background: var(--bg-chat); }
        header { padding: 50px 20px 15px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: var(--msg-me); color: #fff; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: var(--msg-them); color: #fff; border-bottom-left-radius: 4px; }
        .u-tag { font-size: 9px; font-weight: 800; opacity: 0.5; margin-bottom: 4px; display: block; text-transform: uppercase; }

        #typing-status { height: 20px; font-size: 11px; color: var(--accent); padding-left: 20px; opacity: 0; font-weight: 600; }
        footer { padding: 15px; background: #000; display: flex; gap: 10px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        #m-input { flex: 1; background: #1c1c1e; border: none; padding: 12px 18px; border-radius: 25px; color: #fff; outline: none; font-size: 16px; }
        .btn-send { background: var(--accent); color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; }
        .btn-nuke { background: var(--panic); color: #fff; border: none; padding: 5px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body>

    <div id="watermark"></div>

    <div id="login-screen">
        <div class="logo">ANMON</div>
        <div class="sub-logo">BÚNKER SEGURO</div>
        <input type="text" id="u-input" placeholder="OPERADOR">
        <input type="text" id="r-input" placeholder="ID BÚNKER">
        <input type="password" id="p-input" placeholder="PIN DE ACCESO">
        <button class="btn-access" onclick="login()">ENTRAR AL BÚNKER</button>
    </div>

    <div id="chat-screen">
        <header>
            <div id="room-id" style="font-size: 11px; font-weight: 800; color: var(--accent);">CONEXIÓN CIFRADA</div>
            <button class="btn-nuke" onclick="nuke()">PURGAR BÚNKER</button>
        </header>
        <div id="messages"></div>
        <div id="typing-status">...</div>
        <footer>
            <input type="text" id="m-input" placeholder="Escribir mensaje..." autocomplete="off">
            <button class="btn-send" onclick="sendMsg()">></button>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, push, onValue, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyApduAcJs4QITtqQKeNe88WCNPu1iMswO0", 
            authDomain: "anmon-c2f58.firebaseapp.com", 
            databaseURL: "https://anmon-c2f58-default-rtdb.firebaseio.com", 
            projectId: "anmon-c2f58" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUser, currentRoom;

        // PROTECCIÓN AL SALIR DE LA PESTAÑA
        window.onblur = () => document.body.classList.add('blur-mode');
        window.onfocus = () => document.body.classList.remove('blur-mode');

        window.login = async () => {
            const u = document.getElementById('u-input').value.trim().toUpperCase();
            const r = document.getElementById('r-input').value.trim().toLowerCase();
            const p = document.getElementById('p-input').value.trim();

            if(!u || !r || !p) return;

            const pinSnap = await get(ref(db, 'valid_pins/' + p));
            if(pinSnap.exists()) {
                currentUser = u;
                currentRoom = r;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                
                // Activar marca de agua con el nombre del operador
                const wm = document.getElementById('watermark');
                wm.innerText = u;
                wm.style.display = 'block';

                initChat();
            } else {
                alert("ACCESO DENEGADO");
            }
        };

        function initChat() {
            const messagesDiv = document.getElementById('messages');
            
            // ESCUCHA SI SE BORRA LA SALA (Sincroniza el "Borrar todo" para todos)
            onValue(ref(db, 'rooms/' + currentRoom), (snap) => {
                if (!snap.exists()) {
                    messagesDiv.innerHTML = ''; 
                }
            });

            // ESCUCHA MENSAJES NUEVOS
            onChildAdded(ref(db, 'rooms/' + currentRoom + '/messages'), (snap) => {
                const m = snap.val();
                const div = document.createElement('div');
                const isMe = m.user === currentUser;
                div.className = `msg ${isMe ? 'me' : 'them'}`;
                div.innerHTML = `<span class="u-tag">${m.user}</span><div>${m.text}</div>`;
                messagesDiv.appendChild(div);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });

            // ESTADO ESCRIBIENDO
            onValue(ref(db, 'rooms/' + currentRoom + '/typing'), (snap) => {
                const data = snap.val();
                const statusDiv = document.getElementById('typing-status');
                let users = [];
                for (let u in data) if (u !== currentUser && data[u] === true) users.push(u);
                statusDiv.style.opacity = users.length > 0 ? "1" : "0";
                statusDiv.innerText = users.join(', ') + " está escribiendo...";
            });
        }

        // LÓGICA DE ESCRITURA
        let tT;
        document.getElementById('m-input').addEventListener('input', () => {
            if (!currentUser) return;
            set(ref(db, 'rooms/' + currentRoom + '/typing/' + currentUser), true);
            clearTimeout(tT);
            tT = setTimeout(() => {
                set(ref(db, 'rooms/' + currentRoom + '/typing/' + currentUser), false);
            }, 2000);
        });

        window.sendMsg = () => {
            const input = document.getElementById('m-input');
            if(!input.value.trim()) return;
            set(ref(db, 'rooms/' + currentRoom + '/typing/' + currentUser), false);
            push(ref(db, 'rooms/' + currentRoom + '/messages'), { 
                user: currentUser, 
                text: input.value.trim(), 
                ts: Date.now() 
            });
            input.value = '';
        };

        // BOTÓN NUCLEAR: Borra la sala en Firebase para todos
        window.nuke = () => {
            if(confirm("¿DEPURAR BÚNKER? Se borrará todo para todos los presentes.")) {
                remove(ref(db, 'rooms/' + currentRoom));
            }
        };

        document.getElementById('m-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMsg();
        });
    </script>
</body>
</html>
